<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minions Demo 2</title>
  <style>
    :root {
      --bg: #050d1f;
      --panel: #0b1531;
      --line: #7f95ff;
      --panel-border: #6b82fb;
      --text: #f2f7ff;
      --muted: #a6bcff;
      --accent: #9cf2ff;
      --cell: rgba(255, 255, 255, 0.07);
      --head: #f6df6a;
      --body: #4f9cf4;
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% 0, #0f1e43, #050d1f 55%, #040914 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    p {
      margin: 0.25rem 0 0;
      color: var(--muted);
    }

    main {
      width: min(680px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    #game-frame {
      position: relative;
      width: min(640px, min(92vw, 94vh));
      aspect-ratio: 1 / 1;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.6));
      border: 2px solid var(--panel-border);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      touch-action: none;
    }

    #game-frame::before {
      content: '';
      position: absolute;
      inset: 0.65rem;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 0.55rem;
      pointer-events: none;
    }

    #boardCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .hud {
      color: var(--text);
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      color: var(--text);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      background: linear-gradient(180deg, #7a90ff, #6478ff);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #9aafff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minions Demo 2</h1>
    <p>Frontend-only board demo: move with arrows/WASD or tap a nearby cell.</p>
  </header>
  <main>
    <div id="game-frame">
      <canvas id="boardCanvas"></canvas>
    </div>

    <div class="hud">
      <p id="hint" style="margin: 0 0 0.45rem; color: var(--muted)">
        Press Start to enter the deterministic multi-minion loop.
      </p>
      <div class="hud-row">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="timer">0.0</strong>s</span>
      </div>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset" disabled>Reset</button>
    </div>
  </main>
  <footer>
    Static shell; deploy to GitHub Pages via <code>index.html</code> at the repository root.
  </footer>
  <script>
    (function () {
      const frame = document.getElementById('game-frame');
      const hint = document.getElementById('hint');
      const canvas = document.getElementById('boardCanvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');

      const board = { cols: 12, rows: 12 };
      const tickMs = 240;
      const growthPerItem = 1;
      const lcgMultiplier = 1664525;
      const lcgIncrement = 1013904223;
      const initialSeed = 0xdecafbad >>> 0;

      const minionsConfig = [
        {
          id: 0,
          direction: 'right',
          segments: [
            { col: 2, row: 2 },
            { col: 1, row: 2 },
            { col: 0, row: 2 }
          ],
          colors: { body: '#4f9cf4', head: '#f6df6a', accent: '#cce5ff' }
        },
        {
          id: 1,
          direction: 'left',
          segments: [
            { col: 9, row: 9 },
            { col: 10, row: 9 },
            { col: 11, row: 9 }
          ],
          colors: { body: '#74e7bf', head: '#f6f0a5', accent: '#ffffff' }
        },
        {
          id: 2,
          direction: 'down',
          segments: [
            { col: 6, row: 0 },
            { col: 6, row: 1 },
            { col: 6, row: 2 }
          ],
          colors: { body: '#ffb26a', head: '#f6df6a', accent: '#f7dca3' }
        }
      ];

      const directions = {
        up: { dx: 0, dy: -1 },
        down: { dx: 0, dy: 1 },
        left: { dx: -1, dy: 0 },
        right: { dx: 1, dy: 0 }
      };

      const keyToDirection = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        W: 'up',
        s: 'down',
        S: 'down',
        a: 'left',
        A: 'left',
        d: 'right',
        D: 'right'
      };

      const state = {
        status: 'idle',
        score: 0,
        timerMs: 0,
        tickAccumulator: 0,
        world: {
          item: null,
          seed: initialSeed
        },
        phase: 0,
        lastFrameTs: 0,
        minions: [],
        controlledMinionId: 0
      };

      let layout = null;

      function stepRng(seed) {
        return (Math.imul(seed, lcgMultiplier) + lcgIncrement) >>> 0;
      }

      function getCellKey(col, row) {
        return `${col}:${row}`;
      }

      function nextDirectionFromInput(current, requested) {
        if (!requested || requested === current) return current;

        const a = directions[current];
        const b = directions[requested];
        const isReverse = a.dx === -b.dx && a.dy === -b.dy;
        if (isReverse) return current;

        return requested;
      }

      function cloneSegments(segments) {
        return segments.map(({ col, row }) => ({ col, row }));
      }

      function isSameCell(a, b) {
        return a.col === b.col && a.row === b.row;
      }

      function pickSpawn(seed, blockedCells) {
        const totalCells = board.cols * board.rows;
        let nextSeed = seed;
        let spawn = null;

        if (blockedCells.size >= totalCells) {
          return { item: null, nextSeed };
        }

        for (let attempts = 0; attempts < totalCells * 4; attempts += 1) {
          nextSeed = stepRng(nextSeed);
          const col = nextSeed % board.cols;
          nextSeed = stepRng(nextSeed);
          const row = nextSeed % board.rows;
          const candidate = getCellKey(col, row);
          if (!blockedCells.has(candidate)) {
            spawn = { col, row };
            break;
          }
        }

        if (!spawn) {
          for (let row = 0; row < board.rows; row += 1) {
            for (let col = 0; col < board.cols; col += 1) {
              const candidate = getCellKey(col, row);
              if (!blockedCells.has(candidate)) {
                spawn = { col, row };
                break;
              }
            }
            if (spawn) break;
          }
        }

        return { item: spawn, nextSeed };
      }

      function buildOccupancy() {
        const occupancy = new Map();
        for (const minion of state.minions) {
          for (let index = 0; index < minion.segments.length; index += 1) {
            const segment = minion.segments[index];
            const key = getCellKey(segment.col, segment.row);
            const bucket = occupancy.get(key);
            if (bucket) {
              bucket.push({ minionId: minion.id, segmentIndex: index });
            } else {
              occupancy.set(key, [{ minionId: minion.id, segmentIndex: index }]);
            }
          }
        }
        return occupancy;
      }

      function buildBlockedCells() {
        const blocked = new Set();
        for (const minion of state.minions) {
          for (const segment of minion.segments) {
            blocked.add(getCellKey(segment.col, segment.row));
          }
        }
        return blocked;
      }

      function createFreshMinion(config) {
        return {
          id: config.id,
          status: 'alive',
          direction: config.direction,
          queuedDirection: config.direction,
          segments: cloneSegments(config.segments),
          growthQueued: 0,
          score: 0,
          deathReason: null,
          colors: config.colors
        };
      }

      function getControlledMinion() {
        for (let offset = 0; offset < state.minions.length; offset += 1) {
          const minion = state.minions[(state.controlledMinionId + offset) % state.minions.length];
          if (minion.status === 'alive') return minion;
        }
        return null;
      }

      function cycleControlledMinion() {
        if (!state.minions.length) return;
        const len = state.minions.length;
        for (let i = 1; i <= len; i += 1) {
          const idx = (state.controlledMinionId + i) % len;
          if (state.minions[idx].status === 'alive') {
            state.controlledMinionId = idx;
            return;
          }
        }
      }

      function resetState() {
        state.status = 'idle';
        state.score = 0;
        state.timerMs = 0;
        state.tickAccumulator = 0;
        state.world.item = null;
        state.world.seed = initialSeed;
        state.phase = 0;
        state.lastFrameTs = 0;
        state.controlledMinionId = 0;
        state.minions = minionsConfig.map(createFreshMinion);

        const blocked = buildBlockedCells();
        const spawn = pickSpawn(state.world.seed, blocked);
        state.world.item = spawn.item;
        state.world.seed = spawn.nextSeed;

        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resetBtn.disabled = false;
        updateHud();
        drawBoard();
      }

      function pauseButtonsAfterEnd() {
        pauseBtn.disabled = true;
        startBtn.disabled = true;
      }

      function setDirection(intent) {
        if (!intent || !directions[intent]) return;
        const active = getControlledMinion();
        if (!active) return;
        if (state.status === 'gameOver' || state.status === 'won') return;
        active.queuedDirection = intent;
      }

      function step() {
        if (state.status !== 'running') return;

        const occupancy = buildOccupancy();
        const proposals = [];
        const aliveMinions = state.minions.filter((minion) => minion.status === 'alive');
        const minionsById = new Map(state.minions.map((minion) => [minion.id, minion]));

        for (const minion of aliveMinions) {
          const nextDirection = nextDirectionFromInput(minion.direction, minion.queuedDirection);
          const move = directions[nextDirection];
          const head = minion.segments[0];
          const nextHead = {
            col: head.col + move.dx,
            row: head.row + move.dy
          };

          const wallCollision =
            nextHead.col < 0 ||
            nextHead.row < 0 ||
            nextHead.col >= board.cols ||
            nextHead.row >= board.rows;

          proposals.push({
            minionId: minion.id,
            minion,
            direction: nextDirection,
            nextHead,
            willGrow: false,
            wallCollision,
            blocked: false,
            headCollision: false,
            bodyCollision: false
          });
        }

        const itemClaimants = proposals
          .filter((proposal) => !proposal.wallCollision && state.world.item && isSameCell(proposal.nextHead, state.world.item))
          .map((proposal) => proposal.minionId);

        const itemWinnerId = itemClaimants[0] ?? null;

        const proposalById = new Map();
        for (const proposal of proposals) {
          if (state.world.item && isSameCell(proposal.nextHead, state.world.item) && proposal.minionId === itemWinnerId) {
            proposal.willGrow = true;
          }

          if (proposal.wallCollision) {
            proposal.blocked = true;
            proposal.bodyCollision = true;
            proposalById.set(proposal.minionId, proposal);
            continue;
          }

          const key = getCellKey(proposal.nextHead.col, proposal.nextHead.row);
          const occupants = occupancy.get(key);
          const selfMinion = proposal.minion;
          const selfTail = selfMinion.segments[selfMinion.segments.length - 1];
          const selfTailIsHead = selfMinion.segments.length === 1;

          if (occupants) {
            for (const occupant of occupants) {
              const ownerMinion = minionsById.get(occupant.minionId);
              if (!ownerMinion) continue;

              const ownerSegments = ownerMinion.segments;
              const ownerTail = ownerSegments[ownerSegments.length - 1];
              const ownerTailIndex = ownerSegments.length - 1;
              const ownerProposal = proposalById.get(occupant.minionId);
              const ownerWillGrow = ownerProposal ? ownerProposal.willGrow : false;
              const ownerTailWillVacate =
                occupant.minionId === proposal.minionId
                  ? !proposal.willGrow
                  : ownerProposal && ownerMinion.status === 'alive'
                    ? !ownerWillGrow
                    : false;

              if (occupant.minionId === proposal.minionId) {
                if (!(occupant.segmentIndex === ownerTailIndex && ownerTailWillVacate)) {
                  proposal.blocked = true;
                  proposal.bodyCollision = true;
                  break;
                }
                continue;
              }

              if (occupant.segmentIndex !== ownerTailIndex || !ownerTailWillVacate) {
                proposal.blocked = true;
                proposal.bodyCollision = true;
                break;
              }
            }
          }

          proposalById.set(proposal.minionId, proposal);
        }

        for (let i = 0; i < proposals.length; i += 1) {
          const outer = proposals[i];
          if (outer.blocked) continue;
          const outerKey = getCellKey(outer.nextHead.col, outer.nextHead.row);
          for (let j = i + 1; j < proposals.length; j += 1) {
            const inner = proposals[j];
            if (inner.blocked) continue;
            const innerKey = getCellKey(inner.nextHead.col, inner.nextHead.row);
            if (innerKey === outerKey) {
              outer.blocked = true;
              outer.headCollision = true;
              inner.blocked = true;
              inner.headCollision = true;
            }
          }
        }

        const nextMinionSlices = state.minions.map((minion) => {
          const proposal = proposalById.get(minion.id);
          if (!proposal) {
            return minion;
          }

          if (proposal.blocked) {
            return {
              ...minion,
              status: 'dead',
              deathReason: proposal.wallCollision
                ? 'wall'
                : proposal.headCollision
                  ? 'head'
                  : 'body',
              queuedDirection: minion.direction
            };
          }

          const nextSegments = cloneSegments(minion.segments);
          nextSegments.unshift(proposal.nextHead);
          let growthQueued = minion.growthQueued;

          if (proposal.willGrow) {
            growthQueued += growthPerItem;
          }

          if (growthQueued > 0) {
            growthQueued -= 1;
          } else {
            nextSegments.pop();
          }

          return {
            ...minion,
            status: 'alive',
            direction: proposal.direction,
            queuedDirection: proposal.direction,
            segments: nextSegments,
            growthQueued,
            score: proposal.willGrow ? minion.score + 1 : minion.score,
            deathReason: null
          };
        });

        const itemConsumed = proposals.some((proposal) => proposal.willGrow && !proposal.blocked);
        state.minions = nextMinionSlices;

        if (itemConsumed) {
          state.score += 1;
          const blocked = buildBlockedCells();
          const spawn = pickSpawn(state.world.seed, blocked);
          state.world.item = spawn.item;
          state.world.seed = spawn.nextSeed;
        }

        state.phase += 0.01;

        const anyAlive = state.minions.some((minion) => minion.status === 'alive');
        if (!anyAlive) {
          state.status = 'gameOver';
          pauseButtonsAfterEnd();
          return;
        }

        if (state.world.item === null) {
          state.status = 'won';
          pauseButtonsAfterEnd();
          return;
        }

        if (!getControlledMinion()) {
          state.controlledMinionId = 0;
        }
      }

      function measureLayout() {
        const { width, height } = frame.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const inset = 24;
        const boardPx = Math.max(1, Math.min(width, height) - inset * 2);
        const rawCell = Math.floor(boardPx / Math.max(board.cols, board.rows));
        const cellSize = Math.max(8, rawCell);
        const boardWidth = cellSize * board.cols;
        const boardHeight = cellSize * board.rows;

        layout = {
          width,
          height,
          cellSize,
          boardWidth,
          boardHeight,
          x: Math.round((width - boardWidth) / 2),
          y: Math.round((height - boardHeight) / 2)
        };

        drawBoard();
      }

      function drawCellGrid() {
        const { x, y, cellSize } = layout;
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;

        for (let col = 0; col <= board.cols; col++) {
          const px = x + col * cellSize;
          ctx.beginPath();
          ctx.moveTo(px, y);
          ctx.lineTo(px, y + board.rows * cellSize);
          ctx.stroke();
        }

        for (let row = 0; row <= board.rows; row++) {
          const py = y + row * cellSize;
          ctx.beginPath();
          ctx.moveTo(x, py);
          ctx.lineTo(x + board.cols * cellSize, py);
          ctx.stroke();
        }

        for (let row = 0; row < board.rows; row++) {
          for (let col = 0; col < board.cols; col++) {
            if ((row + col) % 2 === 0) {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            } else {
              ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            }
            ctx.fillRect(
              x + col * cellSize,
              y + row * cellSize,
              cellSize,
              cellSize
            );
          }
        }
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
      }

      function drawMinionSegment(col, row, phase, isHead, palette, isDead) {
        const { x, y, cellSize } = layout;
        const baseX = x + (col + 0.5) * cellSize;
        const baseY = y + (row + 0.5) * cellSize;
        const jitter = Math.sin(phase) * (cellSize * 0.06);

        const bodyColor = isDead ? 'rgba(120, 140, 160, 0.7)' : palette.body;
        const headColor = isDead ? 'rgba(170, 176, 190, 0.7)' : palette.head;
        const accentColor = isDead ? '#93a0b0' : palette.accent;

        if (isHead) {
          const bodyWidth = cellSize * 0.46;
          const bodyHeight = cellSize * 0.54;
          const bodyX = baseX - bodyWidth / 2;
          const bodyY = baseY - 0.05 * cellSize + jitter;
          const bodyRadius = bodyWidth * 0.3;
          const bodyBottom = bodyY + bodyHeight;

          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          roundRect(bodyX, bodyY, bodyWidth, bodyHeight, bodyRadius);
          ctx.fill();

          const headRadius = cellSize * 0.29;
          const headX = baseX;
          const headY = baseY - cellSize * 0.22 + jitter * 0.35;
          ctx.fillStyle = headColor;
          ctx.beginPath();
          ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
          ctx.fill();

          if (!isDead) {
            ctx.strokeStyle = '#d4ad2c';
            ctx.lineWidth = Math.max(2, cellSize * 0.05);
            ctx.beginPath();
            ctx.arc(headX, headY, headRadius - 1, -Math.PI * 0.75, Math.PI * 0.75);
            ctx.stroke();
          }

          const eyeGap = cellSize * 0.09;
          const eyeY = headY - cellSize * 0.05;
          const eyeRadius = cellSize * 0.045;
          ctx.fillStyle = '#1a2233';
          ctx.beginPath();
          ctx.arc(headX - eyeGap, eyeY, eyeRadius, 0, Math.PI * 2);
          ctx.arc(headX + eyeGap, eyeY, eyeRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = accentColor;
          ctx.lineWidth = Math.max(2, cellSize * 0.035);
          ctx.beginPath();
          ctx.moveTo(baseX - bodyWidth / 2, baseY + jitter * 0.2);
          ctx.lineTo(baseX + bodyWidth / 2, baseY + jitter * 0.2);
          ctx.stroke();

          const footY = bodyBottom + cellSize * 0.11;
          const footW = bodyWidth * 0.25;
          const footH = cellSize * 0.06;
          ctx.fillStyle = isDead ? 'rgba(120, 100, 60, 0.6)' : '#e2be5a';
          ctx.fillRect(baseX - bodyWidth * 0.26, footY, footW, footH);
          ctx.fillRect(baseX + bodyWidth * 0.01, footY, footW, footH);
          return;
        }

        const radius = cellSize * 0.24;
        ctx.fillStyle = isDead ? 'rgba(100, 125, 170, 0.72)' : 'rgba(80, 160, 244, 0.94)';
        ctx.beginPath();
        ctx.arc(baseX, baseY + jitter * 0.4, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawItem() {
        if (!state.world.item) return;

        const { x, y, cellSize } = layout;
        const cx = x + (state.world.item.col + 0.5) * cellSize;
        const cy = y + (state.world.item.row + 0.5) * cellSize;
        const pulse = (Math.sin(state.phase * 1.8) + 1) / 2;
        const wobble = cellSize * 0.08 * pulse;

        ctx.fillStyle = '#ffd86b';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.18 + wobble, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f6df6a';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.1 + wobble * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawMinion(minion) {
        const isDead = minion.status !== 'alive';
        for (let index = minion.segments.length - 1; index >= 0; index--) {
          const segment = minion.segments[index];
          drawMinionSegment(segment.col, segment.row, state.phase + index * 0.08, index === 0, minion.colors, isDead);
        }
      }

      function drawBoard() {
        if (!layout) return;

        ctx.clearRect(0, 0, layout.width, layout.height);
        ctx.fillStyle = 'rgba(3, 7, 25, 0.95)';
        ctx.fillRect(0, 0, layout.width, layout.height);

        const { x, y, boardWidth, boardHeight } = layout;
        const border = 'rgba(255, 255, 255, 0.18)';

        ctx.fillStyle = 'var(--panel)';
        ctx.fillRect(x - 3, y - 3, boardWidth + 6, boardHeight + 6);
        ctx.fillStyle = 'rgba(3, 11, 33, 0.95)';
        ctx.fillRect(x, y, boardWidth, boardHeight);
        ctx.strokeStyle = border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, boardWidth, boardHeight);

        drawCellGrid();
        for (const minion of state.minions) {
          drawMinion(minion);
        }
        drawItem();

        const active = getControlledMinion();
        const aliveCount = state.minions.filter((minion) => minion.status === 'alive').length;
        ctx.fillStyle = 'rgba(240, 247, 255, 0.92)';
        ctx.font = `${Math.max(12, layout.cellSize * 0.28)}px 'Trebuchet MS', 'Segoe UI', system-ui`;
        ctx.fillText(`Alive: ${aliveCount}/${state.minions.length}`, x + 6, y + boardHeight - 6);
        if (active) {
          ctx.fillText(`Active: M${active.id + 1}`, x + boardWidth - 74, y + boardHeight - 6);
        }
      }

      function updateHud() {
        scoreEl.textContent = String(state.score);
        timerEl.textContent = (state.timerMs / 1000).toFixed(1);

        if (state.status === 'gameOver') {
          hint.textContent = 'All minions died. Press Reset to start again.';
          return;
        }

        if (state.status === 'won') {
          hint.textContent = 'You won. Reset for a new round.';
          return;
        }

        if (state.status === 'running') {
          const statuses = state.minions
            .map((minion) => `M${minion.id + 1}:${minion.status}`)
            .join(' | ');
          hint.textContent = `Use arrows/WASD or tap to steer the active minion. ${statuses}`;
          return;
        }

        hint.textContent = 'Press Start to begin. Tab cycles active minion.';
      }

      function cellFromPointer(event) {
        if (!layout) return null;

        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;

        if (px < layout.x || py < layout.y) return null;

        const col = Math.floor((px - layout.x) / layout.cellSize);
        const row = Math.floor((py - layout.y) / layout.cellSize);

        if (col < 0 || col >= board.cols || row < 0 || row >= board.rows) {
          return null;
        }

        return { col, row };
      }

      function handleDirectionFromPointer(event) {
        if (state.status !== 'running') return;

        const active = getControlledMinion();
        if (!active) return;

        const head = active.segments[0];
        const target = cellFromPointer(event);
        if (!target || !head) return;

        const deltaCol = target.col - head.col;
        const deltaRow = target.row - head.row;

        if (deltaCol === 0 && deltaRow === 0) return;

        if (Math.abs(deltaCol) >= Math.abs(deltaRow)) {
          setDirection(deltaCol > 0 ? 'right' : 'left');
        } else {
          setDirection(deltaRow > 0 ? 'down' : 'up');
        }
      }

      function handleKeydown(event) {
        const requested = keyToDirection[event.key];
        if (requested) {
          event.preventDefault();
          setDirection(requested);
          return;
        }

        if (event.key === 'Tab') {
          event.preventDefault();
          cycleControlledMinion();
          updateHud();
          drawBoard();
          return;
        }

        if (event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          if (state.status === 'running') {
            pauseGame();
            return;
          }
          if (state.status === 'paused') {
            resumeGame();
          }
        }
      }

      function startGame() {
        if (state.status === 'running' || state.status === 'gameOver' || state.status === 'won') return;
        state.status = 'running';
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        updateHud();
      }

      function pauseGame() {
        if (state.status !== 'running') return;
        state.status = 'paused';
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        updateHud();
      }

      function resumeGame() {
        if (state.status !== 'paused') return;
        state.status = 'running';
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        updateHud();
      }

      function resetGame() {
        resetState();
      }

      function loop(ts) {
        if (!state.lastFrameTs) state.lastFrameTs = ts;
        const deltaMs = ts - state.lastFrameTs;
        state.lastFrameTs = ts;

        state.phase += (deltaMs / 1000) * 8;

        if (state.status === 'running' || state.status === 'paused') {
          if (state.status === 'running') {
            state.timerMs += deltaMs;
          }
          state.tickAccumulator += deltaMs;
        }

        while (state.tickAccumulator >= tickMs && state.status === 'running') {
          state.tickAccumulator -= tickMs;
          step();
          if (state.status === 'gameOver' || state.status === 'won') {
            break;
          }
        }

        drawBoard();
        updateHud();
        requestAnimationFrame(loop);
      }

      canvas.addEventListener('pointerdown', handleDirectionFromPointer);
      window.addEventListener('keydown', handleKeydown);
      window.addEventListener('resize', measureLayout);
      startBtn.addEventListener('click', () => {
        if (state.status === 'paused') {
          resumeGame();
          return;
        }
        startGame();
      });
      pauseBtn.addEventListener('click', pauseGame);
      resetBtn.addEventListener('click', resetGame);

      resetState();
      measureLayout();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
