<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minions Demo 2</title>
  <style>
    :root {
      --bg: #050d1f;
      --panel: #0b1531;
      --line: #7f95ff;
      --panel-border: #6b82fb;
      --text: #f2f7ff;
      --muted: #a6bcff;
      --accent: #9cf2ff;
      --cell: rgba(255, 255, 255, 0.07);
      --head: #f6df6a;
      --body: #4f9cf4;
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% 0, #0f1e43, #050d1f 55%, #040914 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    p {
      margin: 0.25rem 0 0;
      color: var(--muted);
    }

    main {
      width: min(680px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    #game-frame {
      position: relative;
      width: min(640px, min(92vw, 94vh));
      aspect-ratio: 1 / 1;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.6));
      border: 2px solid var(--panel-border);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      touch-action: none;
    }

    #game-frame::before {
      content: '';
      position: absolute;
      inset: 0.65rem;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 0.55rem;
      pointer-events: none;
    }

    #boardCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .hud {
      color: var(--text);
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      color: var(--text);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .controls select {
      flex: 1.4;
      min-width: 220px;
      padding: 0.75rem 1rem;
      border-radius: 0.5rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: #0d1b3c;
      color: var(--text);
      font-size: 0.96rem;
      font-weight: 600;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      background: linear-gradient(180deg, #7a90ff, #6478ff);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #9aafff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minions Demo 2</h1>
    <p>Frontend-only board demo: move with arrows/WASD or tap a nearby cell.</p>
  </header>
  <main>
    <div id="game-frame">
      <canvas id="boardCanvas"></canvas>
    </div>

    <div class="hud">
      <p id="hint" style="margin: 0 0 0.45rem; color: var(--muted)">
        Press Start to enter the deterministic single-snake run.
      </p>
      <div class="hud-row">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="timer">0.0</strong>s</span>
      </div>
      <div class="hud-row">
      <span>High Score: <strong id="highScore">0</strong></span>
      <span>Last Run: <strong id="lastRun">none</strong></span>
      </div>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset" disabled>Reset</button>
    </div>
    <div class="controls">
      <select id="scenarioSelect" aria-label="Scenario selector"></select>
      <button id="runScenario">Run Scenario</button>
    </div>
  </main>
  <footer>
    Static shell; deploy to GitHub Pages via <code>index.html</code> at the repository root.
  </footer>
  <script>
    (function () {
      const frame = document.getElementById('game-frame');
      const hint = document.getElementById('hint');
      const canvas = document.getElementById('boardCanvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');
      const highScoreEl = document.getElementById('highScore');
      const lastRunEl = document.getElementById('lastRun');
      const scenarioSelect = document.getElementById('scenarioSelect');
      const runScenarioBtn = document.getElementById('runScenario');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');

      const board = { cols: 12, rows: 12 };
      const tickMs = 240;
      const growthPerItem = 1;
      const lcgMultiplier = 1664525;
      const lcgIncrement = 1013904223;
      const initialSeed = 0xdecafbad >>> 0;
      const STORAGE_KEY = 'minions-demo-2:persistence:v1';
      const SCENARIO_LIMIT_STEPS = 200;

      const scenarioCatalog = [
        {
          id: 'collect-first-item',
          label: 'Collect first item',
          steps: ['right', 'down', 'right'],
          description: 'Steers the active minion through the first spawned item quickly.',
          maxTicks: 12
        },
        {
          id: 'self-collision',
          label: 'Immediate self collision',
          steps: ['left'],
          description: 'Forces the snake into its own body.',
          maxTicks: 20
        }
      ];

      const persistenceDefaults = {
        version: 1,
        highScore: 0,
        lastRunSummary: null
      };

      const state = {
        status: 'idle',
        score: 0,
        timerMs: 0,
        tickAccumulator: 0,
        world: {
          item: null,
          seed: initialSeed
        },
        phase: 0,
        lastFrameTs: 0,
        snake: null,
        tickCount: 0,
        scenarioReplay: null
      };

      const snakeConfig = {
        direction: 'right',
        segments: [
          { col: 2, row: 2 },
          { col: 1, row: 2 },
          { col: 0, row: 2 }
        ],
        colors: {
          body: '#4f9cf4',
          bodyAlt: '#7dc3ff',
          head: '#f6df6a',
          accent: '#cce5ff'
        }
      };

      const directions = {
        up: { dx: 0, dy: -1 },
        down: { dx: 0, dy: 1 },
        left: { dx: -1, dy: 0 },
        right: { dx: 1, dy: 0 }
      };

      const keyToDirection = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        W: 'up',
        s: 'down',
        S: 'down',
        a: 'left',
        A: 'left',
        d: 'right',
        D: 'right'
      };

      let layout = null;
      let persistence = loadPersistenceState();
      const queryScenario = new URLSearchParams(window.location.search).get('scenario');


      function stepRng(seed) {
        return (Math.imul(seed, lcgMultiplier) + lcgIncrement) >>> 0;
      }

      function safeClone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function sanitizePersistence(raw) {
        if (!raw || typeof raw !== 'object') {
          return safeClone(persistenceDefaults);
        }

        const highScore = Number.isFinite(raw.highScore) && raw.highScore >= 0
          ? Math.floor(raw.highScore)
          : 0;

        const lastRunSummary = sanitizeRunSummary(raw.lastRunSummary);

        return {
          version: 1,
          highScore,
          lastRunSummary
        };
      }

      function sanitizeRunSummary(summary) {
        if (!summary || typeof summary !== 'object') return null;

        const scenarioId = typeof summary.scenarioId === 'string' ? summary.scenarioId : null;
        const mode = summary.mode === 'scenario' ? 'scenario' : 'live';
        const status = typeof summary.status === 'string' ? summary.status : 'unknown';
        const safeScore = Number.isFinite(summary.score) && summary.score >= 0
          ? Math.floor(summary.score)
          : 0;
        const safeTimerMs = Number.isFinite(summary.timerMs) && summary.timerMs >= 0
          ? Math.floor(summary.timerMs)
          : 0;
        const safeTickCount = Number.isFinite(summary.tickCount) && summary.tickCount >= 0
          ? Math.floor(summary.tickCount)
          : 0;
        const safeSeed = Number.isFinite(summary.seed) ? Math.floor(summary.seed) >>> 0 : initialSeed;
        const deterministicSig = typeof summary.signature === 'string'
          ? summary.signature
          : `${mode}|${status}|${scenarioId || 'none'}|${safeScore}|${safeTickCount}|${safeSeed}`;

        return {
          scenarioId,
          mode,
          status,
          score: safeScore,
          timerMs: safeTimerMs,
          tickCount: safeTickCount,
          timestamp: typeof summary.timestamp === 'string' ? summary.timestamp : new Date().toISOString(),
          completedBy: typeof summary.completedBy === 'string' ? summary.completedBy : null,
          seed: safeSeed,
          signature: deterministicSig
        };
      }

      function parseStoragePayload(rawValue) {
        try {
          return sanitizePersistence(JSON.parse(rawValue));
        } catch {
          return safeClone(persistenceDefaults);
        }
      }

      function readStorage() {
        try {
          if (!window.localStorage) return null;
          return window.localStorage.getItem(STORAGE_KEY);
        } catch {
          return null;
        }
      }

      function writeStorage(value) {
        try {
          if (!window.localStorage) return false;
          window.localStorage.setItem(STORAGE_KEY, JSON.stringify(value));
          return true;
        } catch {
          return false;
        }
      }

      function loadPersistenceState() {
        const storageValue = readStorage();
        if (!storageValue) return safeClone(persistenceDefaults);
        return parseStoragePayload(storageValue);
      }

      function persistState(nextPersistence) {
        const safe = sanitizePersistence(nextPersistence);
        persistence = safe;
        writeStorage(safe);
        renderPersistenceHud();
      }

      function updateHighScoreIfNeeded(nextScore) {
        if (!Number.isFinite(nextScore)) return;
        if (nextScore > persistence.highScore) {
          const next = sanitizePersistence({
            version: persistence.version,
            highScore: nextScore,
            lastRunSummary: persistence.lastRunSummary
          });
          persistState(next);
        }
      }

      function buildRunSummary(completedBy) {
        return sanitizeRunSummary({
          scenarioId: state.scenarioReplay ? state.scenarioReplay.id : null,
          mode: state.scenarioReplay ? 'scenario' : 'live',
          status: state.status,
          score: state.score,
          timerMs: state.timerMs,
          tickCount: state.tickCount,
          timestamp: new Date().toISOString(),
          completedBy: typeof completedBy === 'string' ? completedBy : 'end',
          seed: state.world.seed
        });
      }

      function commitRunSummary(completedBy) {
        const summary = buildRunSummary(completedBy);
        const next = sanitizePersistence({
          version: persistence.version,
          highScore: Math.max(persistence.highScore || 0, summary.score || 0),
          lastRunSummary: summary
        });
        persistState(next);
        return summary;
      }

      function snapshotState() {
        return safeClone({
          status: state.status,
          score: state.score,
          timerMs: state.timerMs,
          tickAccumulator: state.tickAccumulator,
          world: {
            item: state.world.item ? { col: state.world.item.col, row: state.world.item.row } : null,
            seed: state.world.seed
          },
          phase: state.phase,
          lastFrameTs: state.lastFrameTs,
          tickCount: state.tickCount,
          snake: state.snake ? {
            status: state.snake.status,
            direction: state.snake.direction,
            queuedDirection: state.snake.queuedDirection,
            segments: cloneSegments(state.snake.segments),
            growthQueued: state.snake.growthQueued,
            score: state.snake.score,
            deathReason: state.snake.deathReason,
            colors: { ...state.snake.colors }
          } : null
        });
      }

      function restoreState(snap) {
        if (!snap || typeof snap !== 'object') return;

        state.status = snap.status;
        state.score = snap.score;
        state.timerMs = snap.timerMs;
        state.tickAccumulator = snap.tickAccumulator;
        state.world = {
          item: snap.world && snap.world.item ? { col: snap.world.item.col, row: snap.world.item.row } : null,
          seed: snap.world && Number.isFinite(snap.world.seed) ? snap.world.seed >>> 0 : initialSeed
        };
        state.phase = snap.phase;
        state.lastFrameTs = snap.lastFrameTs;
        state.tickCount = snap.tickCount || 0;
        state.snake = snap.snake
          ? {
              status: snap.snake.status || 'alive',
              direction: snap.snake.direction || 'up',
              queuedDirection: snap.snake.queuedDirection || snap.snake.direction || 'up',
              segments: cloneSegments(snap.snake.segments || []),
              growthQueued: Number.isFinite(snap.snake.growthQueued) ? snap.snake.growthQueued : 0,
              score: Number.isFinite(snap.snake.score) ? snap.snake.score : 0,
              deathReason: snap.snake.deathReason || null,
              colors: snap.snake.colors || {
                body: '#fff',
                bodyAlt: '#d2ebff',
                head: '#fff',
                accent: '#fff'
              }
            }
          : createFreshSnake();
      }

      function fillScenarioControls() {
        scenarioSelect.innerHTML = '';
        for (const scenario of scenarioCatalog) {
          const option = document.createElement('option');
          option.value = scenario.id;
          option.textContent = scenario.label;
          scenarioSelect.appendChild(option);
        }
        if (scenarioCatalog[0]) {
          scenarioSelect.value = scenarioCatalog[0].id;
        }
      }

      function renderPersistenceHud() {
        highScoreEl.textContent = String(persistence.highScore || 0);
        if (!persistence.lastRunSummary) {
          lastRunEl.textContent = 'none';
          return;
        }

        const summary = persistence.lastRunSummary;
        lastRunEl.textContent = `${summary.mode}:${summary.status}:${summary.score} (@${summary.tickCount}t)`;
      }

      function getCellKey(col, row) {
        return `${col}:${row}`;
      }

      function nextDirectionFromInput(current, requested) {
        if (!requested || requested === current) return current;

        const a = directions[current];
        const b = directions[requested];
        const isReverse = a.dx === -b.dx && a.dy === -b.dy;
        if (isReverse) return current;

        return requested;
      }

      function cloneSegments(segments) {
        return segments.map(({ col, row }) => ({ col, row }));
      }

      function isSameCell(a, b) {
        return a.col === b.col && a.row === b.row;
      }

      function pickSpawn(seed, blockedCells) {
        const totalCells = board.cols * board.rows;
        let nextSeed = seed;
        let spawn = null;

        if (blockedCells.size >= totalCells) {
          return { item: null, nextSeed };
        }

        for (let attempts = 0; attempts < totalCells * 4; attempts += 1) {
          nextSeed = stepRng(nextSeed);
          const col = nextSeed % board.cols;
          nextSeed = stepRng(nextSeed);
          const row = nextSeed % board.rows;
          const candidate = getCellKey(col, row);
          if (!blockedCells.has(candidate)) {
            spawn = { col, row };
            break;
          }
        }

        if (!spawn) {
          for (let row = 0; row < board.rows; row += 1) {
            for (let col = 0; col < board.cols; col += 1) {
              const candidate = getCellKey(col, row);
              if (!blockedCells.has(candidate)) {
                spawn = { col, row };
                break;
              }
            }
            if (spawn) break;
          }
        }

        return { item: spawn, nextSeed };
      }

      function buildOccupancy() {
        const occupancy = new Map();
        if (!state.snake) return occupancy;
        for (let index = 0; index < state.snake.segments.length; index += 1) {
          const segment = state.snake.segments[index];
          occupancy.set(getCellKey(segment.col, segment.row), index);
        }
        return occupancy;
      }

      function buildBlockedCells() {
        const blocked = new Set();
        if (!state.snake) return blocked;
        for (const segment of state.snake.segments) {
          blocked.add(getCellKey(segment.col, segment.row));
        }
        return blocked;
      }

      function createFreshSnake(config = snakeConfig) {
        return {
          status: 'alive',
          direction: config.direction,
          queuedDirection: config.direction,
          segments: cloneSegments(config.segments),
          growthQueued: 0,
          score: 0,
          deathReason: null,
          colors: { ...config.colors }
        };
      }

      function getScenarioById(id) {
        return scenarioCatalog.find((scenario) => scenario.id === id) || null;
      }

      function initializeRun(seed = initialSeed) {
        const nextSeed = Number.isFinite(seed) ? seed >>> 0 : initialSeed;
        state.status = 'idle';
        state.score = 0;
        state.timerMs = 0;
        state.tickAccumulator = 0;
        state.world.item = null;
        state.world.seed = nextSeed;
        state.phase = 0;
        state.lastFrameTs = 0;
        state.tickCount = 0;
        state.scenarioReplay = null;
        state.snake = createFreshSnake();

        const blocked = buildBlockedCells();
        const spawn = pickSpawn(state.world.seed, blocked);
        state.world.item = spawn.item;
        state.world.seed = spawn.nextSeed;
      }

      function resetState() {
        initializeRun(initialSeed);
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resetBtn.disabled = false;
        updateHud();
        drawBoard();
      }

      function runScenario(scenarioId) {
        const scenario = getScenarioById(scenarioId);
        if (!scenario) {
          hint.textContent = `Scenario "${scenarioId}" not found.`;
          return null;
        }

        if (state.status === 'running') {
          hint.textContent = 'Stop the running game before running a scenario.';
          return null;
        }

        const snapshot = snapshotState();
        initializeRun(Number.isFinite(scenario.seed) ? scenario.seed : initialSeed);

        const steps = Array.isArray(scenario.steps) ? scenario.steps : [];
        const requestedTicks = Number.isFinite(scenario.maxTicks) && scenario.maxTicks > 0
          ? Math.floor(scenario.maxTicks)
          : steps.length;
        const maxTicks = Math.min(
          SCENARIO_LIMIT_STEPS,
          Math.max(0, Number.isFinite(requestedTicks) ? requestedTicks : steps.length)
        );

        state.status = 'running';
        state.scenarioReplay = {
          id: scenario.id,
          mode: 'scenario',
          maxTicks
        };

        for (let i = 0; i < maxTicks; i += 1) {
          if (state.status !== 'running') {
            break;
          }
          const command = steps[i];
          if (command) {
            setDirection(command);
          }
          step();
        }

        state.timerMs = state.tickCount * tickMs;
        const completionReason = state.status === 'gameOver' || state.status === 'won'
          ? `scenario-${state.status}`
          : 'scenario-tick-limit';

        const summary = buildRunSummary(completionReason);
        summary.mode = 'scenario';
        const persistedSummary = commitRunSummary(completionReason);

        restoreState(snapshot);
        state.scenarioReplay = null;
        updateHud();
        drawBoard();
        renderPersistenceHud();

        hint.textContent = scenario.id ? `Scenario "${scenario.label || scenario.id}" finished (${completionReason}).` : hint.textContent;

        return {
          scenario,
          summary,
          persistedSummary
        };
      }

      function pauseButtonsAfterEnd() {
        pauseBtn.disabled = true;
        startBtn.disabled = true;
      }

      function setDirection(intent) {
        if (!intent || !directions[intent]) return;
        if (!state.snake || state.snake.status !== 'alive') return;
        if (state.status === 'gameOver' || state.status === 'won') return;
        state.snake.queuedDirection = intent;
      }

      function step() {
        if (state.status !== 'running') return;
        state.tickCount += 1;

        if (!state.snake || state.snake.status !== 'alive') {
          state.status = 'gameOver';
          commitRunSummary('step-end');
          pauseButtonsAfterEnd();
          return;
        }

        const occupancy = buildOccupancy();
        const nextDirection = nextDirectionFromInput(state.snake.direction, state.snake.queuedDirection);
        const move = directions[nextDirection];
        const head = state.snake.segments[0];
        const nextHead = {
          col: head.col + move.dx,
          row: head.row + move.dy
        };
        const willGrow = Boolean(state.world.item && isSameCell(nextHead, state.world.item));

        const wallCollision =
          nextHead.col < 0 ||
          nextHead.row < 0 ||
          nextHead.col >= board.cols ||
          nextHead.row >= board.rows;

        let blocked = false;
        let deathReason = null;
        if (wallCollision) {
          blocked = true;
          deathReason = 'wall';
        } else {
          const occupantIndex = occupancy.get(getCellKey(nextHead.col, nextHead.row));
          if (occupantIndex !== undefined) {
            const tailIndex = state.snake.segments.length - 1;
            const isTailCell = occupantIndex === tailIndex;
            const tailWillVacate = !willGrow;
            if (!(isTailCell && tailWillVacate)) {
              blocked = true;
              deathReason = 'body';
            }
          }
        }

        if (blocked) {
          state.snake = {
            ...state.snake,
            status: 'dead',
            deathReason,
            queuedDirection: state.snake.direction
          };
          state.status = 'gameOver';
          commitRunSummary('step-end');
          pauseButtonsAfterEnd();
          return;
        }

        const nextSegments = cloneSegments(state.snake.segments);
        nextSegments.unshift(nextHead);

        let growthQueued = state.snake.growthQueued;
        if (willGrow) {
          growthQueued += growthPerItem;
          state.score += 1;
          state.snake.score += 1;
        }

        if (growthQueued > 0) {
          growthQueued -= 1;
        } else {
          nextSegments.pop();
        }

        state.snake = {
          ...state.snake,
          direction: nextDirection,
          queuedDirection: nextDirection,
          segments: nextSegments,
          growthQueued,
          status: 'alive',
          deathReason: null
        };

        if (willGrow) {
          const blocked = buildBlockedCells();
          const spawn = pickSpawn(state.world.seed, blocked);
          state.world.item = spawn.item;
          state.world.seed = spawn.nextSeed;
        }

        state.phase += 0.01;

        if (state.world.item === null) {
          state.status = 'won';
          commitRunSummary('step-end');
          pauseButtonsAfterEnd();
          return;
        }
      }

      function measureLayout() {
        const { width, height } = frame.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const inset = 24;
        const boardPx = Math.max(1, Math.min(width, height) - inset * 2);
        const rawCell = Math.floor(boardPx / Math.max(board.cols, board.rows));
        const cellSize = Math.max(8, rawCell);
        const boardWidth = cellSize * board.cols;
        const boardHeight = cellSize * board.rows;

        layout = {
          width,
          height,
          cellSize,
          boardWidth,
          boardHeight,
          x: Math.round((width - boardWidth) / 2),
          y: Math.round((height - boardHeight) / 2)
        };

        drawBoard();
      }

      function drawCellGrid() {
        const { x, y, cellSize } = layout;
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;

        for (let col = 0; col <= board.cols; col++) {
          const px = x + col * cellSize;
          ctx.beginPath();
          ctx.moveTo(px, y);
          ctx.lineTo(px, y + board.rows * cellSize);
          ctx.stroke();
        }

        for (let row = 0; row <= board.rows; row++) {
          const py = y + row * cellSize;
          ctx.beginPath();
          ctx.moveTo(x, py);
          ctx.lineTo(x + board.cols * cellSize, py);
          ctx.stroke();
        }

        for (let row = 0; row < board.rows; row++) {
          for (let col = 0; col < board.cols; col++) {
            if ((row + col) % 2 === 0) {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            } else {
              ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            }
            ctx.fillRect(
              x + col * cellSize,
              y + row * cellSize,
              cellSize,
              cellSize
            );
          }
        }
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
      }

      function drawMinionSegment(col, row, phase, isHead, palette, isDead) {
        const { x, y, cellSize } = layout;
        const baseX = x + (col + 0.5) * cellSize;
        const baseY = y + (row + 0.5) * cellSize;
        const jitter = Math.sin(phase) * (cellSize * 0.06);

        const bodyColor = isDead ? 'rgba(120, 140, 160, 0.7)' : palette.body;
        const headColor = isDead ? 'rgba(170, 176, 190, 0.7)' : palette.head;
        const accentColor = isDead ? '#93a0b0' : palette.accent;

        if (isHead) {
          const bodyWidth = cellSize * 0.46;
          const bodyHeight = cellSize * 0.54;
          const bodyX = baseX - bodyWidth / 2;
          const bodyY = baseY - 0.05 * cellSize + jitter;
          const bodyRadius = bodyWidth * 0.3;
          const bodyBottom = bodyY + bodyHeight;

          ctx.fillStyle = bodyColor;
          ctx.beginPath();
          roundRect(bodyX, bodyY, bodyWidth, bodyHeight, bodyRadius);
          ctx.fill();

          const headRadius = cellSize * 0.29;
          const headX = baseX;
          const headY = baseY - cellSize * 0.22 + jitter * 0.35;
          ctx.fillStyle = headColor;
          ctx.beginPath();
          ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
          ctx.fill();

          if (!isDead) {
            ctx.strokeStyle = '#d4ad2c';
            ctx.lineWidth = Math.max(2, cellSize * 0.05);
            ctx.beginPath();
            ctx.arc(headX, headY, headRadius - 1, -Math.PI * 0.75, Math.PI * 0.75);
            ctx.stroke();
          }

          const eyeGap = cellSize * 0.09;
          const eyeY = headY - cellSize * 0.05;
          const eyeRadius = cellSize * 0.045;
          ctx.fillStyle = '#1a2233';
          ctx.beginPath();
          ctx.arc(headX - eyeGap, eyeY, eyeRadius, 0, Math.PI * 2);
          ctx.arc(headX + eyeGap, eyeY, eyeRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = accentColor;
          ctx.lineWidth = Math.max(2, cellSize * 0.035);
          ctx.beginPath();
          ctx.moveTo(baseX - bodyWidth / 2, baseY + jitter * 0.2);
          ctx.lineTo(baseX + bodyWidth / 2, baseY + jitter * 0.2);
          ctx.stroke();

          const footY = bodyBottom + cellSize * 0.11;
          const footW = bodyWidth * 0.25;
          const footH = cellSize * 0.06;
          ctx.fillStyle = isDead ? 'rgba(120, 100, 60, 0.6)' : '#e2be5a';
          ctx.fillRect(baseX - bodyWidth * 0.26, footY, footW, footH);
          ctx.fillRect(baseX + bodyWidth * 0.01, footY, footW, footH);
          return;
        }

        const radius = cellSize * 0.24;
        ctx.fillStyle = isDead ? 'rgba(100, 125, 170, 0.72)' : 'rgba(80, 160, 244, 0.94)';
        ctx.beginPath();
        ctx.arc(baseX, baseY + jitter * 0.4, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawItem() {
        if (!state.world.item) return;

        const { x, y, cellSize } = layout;
        const cx = x + (state.world.item.col + 0.5) * cellSize;
        const cy = y + (state.world.item.row + 0.5) * cellSize;
        const pulse = (Math.sin(state.phase * 1.8) + 1) / 2;
        const wobble = cellSize * 0.08 * pulse;

        ctx.fillStyle = '#ffd86b';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.18 + wobble, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f6df6a';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.1 + wobble * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawMinion(minion) {
        const isDead = minion.status !== 'alive';
        for (let index = minion.segments.length - 1; index >= 0; index--) {
          const segment = minion.segments[index];
          const tone = index % 2 === 0 ? minion.colors.body : minion.colors.bodyAlt;
          drawMinionSegment(segment.col, segment.row, state.phase + index * 0.08, index === 0, {
            ...minion.colors,
            body: tone
          }, isDead);
        }
      }

      function drawBoard() {
        if (!layout) return;

        ctx.clearRect(0, 0, layout.width, layout.height);
        ctx.fillStyle = 'rgba(3, 7, 25, 0.95)';
        ctx.fillRect(0, 0, layout.width, layout.height);

        const { x, y, boardWidth, boardHeight } = layout;
        const border = 'rgba(255, 255, 255, 0.18)';

        ctx.fillStyle = 'var(--panel)';
        ctx.fillRect(x - 3, y - 3, boardWidth + 6, boardHeight + 6);
        ctx.fillStyle = 'rgba(3, 11, 33, 0.95)';
        ctx.fillRect(x, y, boardWidth, boardHeight);
        ctx.strokeStyle = border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, boardWidth, boardHeight);

        drawCellGrid();
        if (state.snake) {
          drawMinion(state.snake);
        }
        drawItem();
        ctx.fillStyle = 'rgba(240, 247, 255, 0.92)';
        ctx.font = `${Math.max(12, layout.cellSize * 0.28)}px 'Trebuchet MS', 'Segoe UI', system-ui`;
        const length = state.snake ? state.snake.segments.length : 0;
        ctx.fillText(`Minion length: ${length}`, x + 6, y + boardHeight - 6);
      }

      function updateHud() {
        scoreEl.textContent = String(state.score);
        timerEl.textContent = (state.timerMs / 1000).toFixed(1);

        if (state.status === 'gameOver') {
          hint.textContent = 'The minion crashed. Press Reset to start again.';
          return;
        }

        if (state.status === 'won') {
          hint.textContent = 'You won. Reset for a new round.';
          return;
        }

        if (state.status === 'running') {
          hint.textContent = 'Use arrows/WASD or tap to steer the snake.';
          return;
        }

        hint.textContent = 'Press Start to begin.';
      }

      function cellFromPointer(event) {
        if (!layout) return null;

        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;

        if (px < layout.x || py < layout.y) return null;

        const col = Math.floor((px - layout.x) / layout.cellSize);
        const row = Math.floor((py - layout.y) / layout.cellSize);

        if (col < 0 || col >= board.cols || row < 0 || row >= board.rows) {
          return null;
        }

        return { col, row };
      }

      function handleDirectionFromPointer(event) {
        if (state.status !== 'running') return;

        if (!state.snake || state.snake.status !== 'alive') return;

        const head = state.snake.segments[0];
        const target = cellFromPointer(event);
        if (!target || !head) return;

        const deltaCol = target.col - head.col;
        const deltaRow = target.row - head.row;

        if (deltaCol === 0 && deltaRow === 0) return;

        if (Math.abs(deltaCol) >= Math.abs(deltaRow)) {
          setDirection(deltaCol > 0 ? 'right' : 'left');
        } else {
          setDirection(deltaRow > 0 ? 'down' : 'up');
        }
      }

      function handleKeydown(event) {
        const requested = keyToDirection[event.key];
        if (requested) {
          event.preventDefault();
          setDirection(requested);
          return;
        }

        if (event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          if (state.status === 'running') {
            pauseGame();
            return;
          }
          if (state.status === 'paused') {
            resumeGame();
          }
        }
      }

      function startGame() {
        if (state.status === 'running' || state.status === 'gameOver' || state.status === 'won') return;
        state.status = 'running';
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        updateHud();
        state.scenarioReplay = null;
      }

      function pauseGame() {
        if (state.status !== 'running') return;
        state.status = 'paused';
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        updateHud();
      }

      function resumeGame() {
        if (state.status !== 'paused') return;
        state.status = 'running';
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        updateHud();
      }

      function resetGame() {
        resetState();
      }

      function loop(ts) {
        if (!state.lastFrameTs) state.lastFrameTs = ts;
        const deltaMs = ts - state.lastFrameTs;
        state.lastFrameTs = ts;

        state.phase += (deltaMs / 1000) * 8;

        if (state.status === 'running' || state.status === 'paused') {
          if (state.status === 'running') {
            state.timerMs += deltaMs;
          }
          state.tickAccumulator += deltaMs;
        }

        while (state.tickAccumulator >= tickMs && state.status === 'running') {
          state.tickAccumulator -= tickMs;
          step();
          if (state.status === 'gameOver' || state.status === 'won') {
            break;
          }
        }

        drawBoard();
        updateHud();
        requestAnimationFrame(loop);
      }

      canvas.addEventListener('pointerdown', handleDirectionFromPointer);
      window.addEventListener('keydown', handleKeydown);
      window.addEventListener('resize', measureLayout);
      startBtn.addEventListener('click', () => {
        if (state.status === 'paused') {
          resumeGame();
          return;
        }
        startGame();
      });
      pauseBtn.addEventListener('click', pauseGame);
      resetBtn.addEventListener('click', resetGame);
      runScenarioBtn.addEventListener('click', () => {
        runScenario(scenarioSelect.value);
      });

      window.minionsDemo = {
        runScenario,
        getPersistence: () => safeClone(persistence),
        getStateSummary: () => buildRunSummary('manual-readout'),
        getScenarioCatalog: () => safeClone(scenarioCatalog),
        resetGame
      };
      window.minionsScenarioRunner = {
        run: runScenario,
        scenarios: () => safeClone(scenarioCatalog),
        runLast: () => runScenario(queryScenario || scenarioCatalog[0]?.id)
      };

      fillScenarioControls();
      renderPersistenceHud();
      resetState();
      if (scenarioCatalog.length) {
        runScenarioBtn.disabled = false;
        const queryScenarioRef = getScenarioById(queryScenario);
        if (queryScenarioRef) {
          scenarioSelect.value = queryScenarioRef.id;
          runScenario(queryScenarioRef.id);
        }
      } else {
        runScenarioBtn.disabled = true;
      }
      measureLayout();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
