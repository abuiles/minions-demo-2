<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minions Demo 2</title>
  <style>
    :root {
      --bg: #050d1f;
      --panel: #0b1531;
      --line: #7f95ff;
      --panel-border: #6b82fb;
      --text: #f2f7ff;
      --muted: #a6bcff;
      --accent: #9cf2ff;
      --cell: rgba(255, 255, 255, 0.07);
      --head: #f6df6a;
      --body: #4f9cf4;
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% 0, #0f1e43, #050d1f 55%, #040914 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    p {
      margin: 0.25rem 0 0;
      color: var(--muted);
    }

    main {
      width: min(680px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    #game-frame {
      position: relative;
      width: min(640px, min(92vw, 94vh));
      aspect-ratio: 1 / 1;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.6));
      border: 2px solid var(--panel-border);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      touch-action: none;
    }

    #game-frame::before {
      content: '';
      position: absolute;
      inset: 0.65rem;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 0.55rem;
      pointer-events: none;
    }

    #boardCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .hud {
      color: var(--text);
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 1.2rem;
      color: var(--text);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      background: linear-gradient(180deg, #7a90ff, #6478ff);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #9aafff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minions Demo 2</h1>
    <p>Frontend-only board demo: move with arrows/WASD or tap a nearby cell.</p>
  </header>
  <main>
    <div id="game-frame">
      <canvas id="boardCanvas"></canvas>
    </div>

    <div class="hud">
      <p id="hint" style="margin: 0 0 0.45rem; color: var(--muted)">
        Press Start to enter the deterministic snake-style loop.
      </p>
      <div class="hud-row">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="timer">0.0</strong>s</span>
      <span>High Score: <strong id="high-score">0</strong></span>
      <span>Last run: <strong id="last-run">-</strong></span>
      </div>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset" disabled>Reset</button>
    </div>
  </main>
  <footer>
    Static shell; deploy to GitHub Pages via <code>index.html</code> at the repository root.
  </footer>
  <script>
    (function () {
      const frame = document.getElementById('game-frame');
      const hint = document.getElementById('hint');
      const canvas = document.getElementById('boardCanvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');
      const highScoreEl = document.getElementById('high-score');
      const lastRunEl = document.getElementById('last-run');

      const STORAGE_KEYS = {
        highScore: 'minions-demo-2.high-score',
        lastRun: 'minions-demo-2.last-run-summary'
      };
      const storageState = { supported: false };

      const board = { cols: 12, rows: 12 };
      const tickMs = 240;
      const growthPerItem = 1;
      const lcgMultiplier = 1664525;
      const lcgIncrement = 1013904223;
      const initialSeed = 0xdecafbad >>> 0;
      const initialDirection = 'right';
      let highScore = 0;
      let lastRunSummary = null;
      let runSequence = 0;

      const directions = {
        up: { dx: 0, dy: -1 },
        down: { dx: 0, dy: 1 },
        left: { dx: -1, dy: 0 },
        right: { dx: 1, dy: 0 }
      };

      const keyToDirection = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        W: 'up',
        s: 'down',
        S: 'down',
        a: 'left',
        A: 'left',
        d: 'right',
        D: 'right'
      };

      function detectStorageSupport() {
        if (typeof localStorage === 'undefined') return false;
        try {
          const probeKey = '__minions_demo_2_storage_probe__';
          localStorage.setItem(probeKey, '1');
          localStorage.removeItem(probeKey);
          return true;
        } catch (error) {
          return false;
        }
      }

      function readStorageJson(key, fallback) {
        if (!storageState.supported) return fallback;
        try {
          const raw = localStorage.getItem(key);
          if (raw === null) return fallback;
          return JSON.parse(raw);
        } catch (error) {
          return fallback;
        }
      }

      function writeStorageJson(key, value) {
        if (!storageState.supported) return false;
        try {
          localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          return false;
        }
      }

      function safeInteger(value, fallback, min = 0) {
        if (typeof value !== 'number' || !Number.isFinite(value)) return fallback;
        const parsed = Math.trunc(value);
        return parsed < min ? min : parsed;
      }

      function safeNumber(value, fallback, min = -Infinity) {
        if (typeof value !== 'number' || !Number.isFinite(value)) return fallback;
        return value < min ? min : value;
      }

      function toUint32(value, fallback = 0) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) return fallback >>> 0;
        return parsed >>> 0;
      }

      function isObject(value) {
        return value !== null && typeof value === 'object' && !Array.isArray(value);
      }

      function clampDirection(value) {
        return directions[value] ? value : initialDirection;
      }

      function normalizeRunSummary(candidate) {
        if (!isObject(candidate)) return null;

        return {
          status: typeof candidate.status === 'string' ? candidate.status : 'idle',
          score: safeInteger(candidate.score, 0),
          timerMs: safeNumber(candidate.timerMs, 0, 0),
          steps: safeInteger(candidate.steps, 0),
          seed: toUint32(candidate.seed, initialSeed),
          finalSeed: toUint32(candidate.finalSeed, toUint32(candidate.seed, initialSeed)),
          snakeLength: safeInteger(candidate.snakeLength, 0),
          timestamp: safeInteger(candidate.timestamp, 0, 0)
        };
      }

      function hydratePersistence() {
        storageState.supported = detectStorageSupport();
        if (!storageState.supported) return;
        highScore = safeInteger(readStorageJson(STORAGE_KEYS.highScore, 0), 0, 0);
        lastRunSummary = normalizeRunSummary(readStorageJson(STORAGE_KEYS.lastRun, null));
      }

      function persistHighScore() {
        if (!storageState.supported) return;
        writeStorageJson(STORAGE_KEYS.highScore, highScore);
      }

      function persistLastRunSummary(summary) {
        if (!storageState.supported || !summary) return;
        writeStorageJson(STORAGE_KEYS.lastRun, summary);
      }

      function summarizeState(currentState, includeTimestamp = false) {
        return {
          status: currentState.status,
          score: currentState.score,
          timerMs: currentState.timerMs,
          steps: currentState.tickCount,
          seed: currentState.seedStart,
          finalSeed: currentState.seed,
          snakeLength: currentState.snake.length,
          ...(includeTimestamp ? { timestamp: Date.now() } : {})
        };
      }

      function recordRunEnd(currentState) {
        const summary = summarizeState(currentState, true);
        lastRunSummary = summary;

        if (currentState.score > highScore) {
          highScore = currentState.score;
          persistHighScore();
        }

        persistLastRunSummary(summary);
        highScoreEl.textContent = String(highScore);
        renderLastRun();
      }

      function renderLastRun() {
        if (!lastRunSummary) {
          lastRunEl.textContent = '-';
          return;
        }
        lastRunEl.textContent = `${lastRunSummary.status} ${lastRunSummary.score} (${(lastRunSummary.timerMs / 1000).toFixed(1)}s)`;
      }

      function defaultSnake() {
        return [
          { col: 5, row: 5 },
          { col: 4, row: 5 },
          { col: 3, row: 5 }
        ];
      }

      function pickSpawnedState(seed, blockedCells) {
        const spawn = pickSpawn(seed, blockedCells);
        return {
          item: spawn.item,
          seed: spawn.nextSeed
        };
      }

      function createFreshState(seed = initialSeed, customSnake) {
        runSequence += 1;
        const startSeed = toUint32(seed, initialSeed);
        const freshState = {
          status: 'idle',
          score: 0,
          timerMs: 0,
          frameAccumulator: 0,
          tickAccumulator: 0,
          direction: initialDirection,
          queuedDirection: initialDirection,
          snake: customSnake || defaultSnake(),
          growthQueued: 0,
          seed: startSeed,
          seedStart: startSeed,
          item: null,
          phase: 0,
          lastFrameTs: 0,
          tickCount: 0,
          runId: runSequence
        };

        const blocked = occupiedBySnake(freshState.snake);
        const spawn = pickSpawnedState(freshState.seed, blocked);
        freshState.item = spawn.item;
        freshState.seed = spawn.seed;
        return freshState;
      }

      function cloneForScenario(currentState) {
        return {
          status: currentState.status,
          score: currentState.score,
          timerMs: currentState.timerMs,
          frameAccumulator: currentState.frameAccumulator,
          tickAccumulator: currentState.tickAccumulator,
          direction: currentState.direction,
          queuedDirection: currentState.queuedDirection,
          snake: currentState.snake.map((segment) => ({ col: segment.col, row: segment.row })),
          growthQueued: currentState.growthQueued,
          seed: currentState.seed,
          seedStart: currentState.seedStart,
          item: currentState.item ? { col: currentState.item.col, row: currentState.item.row } : null,
          phase: currentState.phase,
          lastFrameTs: currentState.lastFrameTs,
          tickCount: currentState.tickCount,
          runId: currentState.runId
        };
      }

      let state = createFreshState();

      let layout = null;

      function stepRng(seed) {
        return (Math.imul(seed, lcgMultiplier) + lcgIncrement) >>> 0;
      }

      function keyFromCell(col, row) {
        return `${col}:${row}`;
      }

      function nextDirectionFromInput(current, requested) {
        if (!requested || requested === current) return current;

        const a = directions[current];
        const b = directions[requested];
        const isReverse = a.dx === -b.dx && a.dy === -b.dy;
        if (isReverse) return current;

        return requested;
      }

      function occupiedBySnake(snake) {
        const blocked = new Set();
        for (const segment of snake) {
          blocked.add(keyFromCell(segment.col, segment.row));
        }
        return blocked;
      }

      function pickSpawn(seed, blockedCells) {
        const totalCells = board.cols * board.rows;
        let nextSeed = seed;
        let spawn = null;

        if (blockedCells.size >= totalCells) {
          return { item: null, nextSeed };
        }

        for (let attempts = 0; attempts < totalCells * 4; attempts += 1) {
          nextSeed = stepRng(nextSeed);
          const col = nextSeed % board.cols;
          nextSeed = stepRng(nextSeed);
          const row = nextSeed % board.rows;
          const candidate = keyFromCell(col, row);
          if (!blockedCells.has(candidate)) {
            spawn = { col, row };
            break;
          }
        }

        if (!spawn) {
          // Deterministic fallback scan when pseudo-random path is exhausted.
          for (let row = 0; row < board.rows; row += 1) {
            for (let col = 0; col < board.cols; col += 1) {
              const candidate = keyFromCell(col, row);
              if (!blockedCells.has(candidate)) {
                spawn = { col, row };
                break;
              }
            }
            if (spawn) break;
          }
        }

        return { item: spawn, nextSeed };
      }

      function isSameCell(a, b) {
        return a.col === b.col && a.row === b.row;
      }

      function resetState() {
        state = createFreshState();
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resetBtn.disabled = false;
        updateHud();
        drawBoard();
      }

      function pauseButtonsAfterEnd() {
        pauseBtn.disabled = true;
        startBtn.disabled = true;
      }

      function setDirection(intent) {
        if (!intent || !directions[intent]) return;
        if (state.status === 'gameOver' || state.status === 'won') return;
        state.queuedDirection = intent;
      }

      function step(gameState = state) {
        if (gameState.status !== 'running') return;

        gameState.direction = nextDirectionFromInput(gameState.direction, gameState.queuedDirection);
        const move = directions[gameState.direction];
        const head = gameState.snake[0];
        const nextHead = {
          col: head.col + move.dx,
          row: head.row + move.dy
        };

        const hitWall =
          nextHead.col < 0 ||
          nextHead.row < 0 ||
          nextHead.col >= board.cols ||
          nextHead.row >= board.rows;

        const bodyForSelfCollision =
          gameState.growthQueued > 0 ? gameState.snake : gameState.snake.slice(0, -1);

        const hitSelf = bodyForSelfCollision.some((segment) => isSameCell(segment, nextHead));

        if (hitWall || hitSelf) {
          gameState.status = 'gameOver';
          if (gameState === state) {
            pauseButtonsAfterEnd();
            recordRunEnd(gameState);
          }
          return;
        }

        gameState.snake.unshift(nextHead);
        gameState.tickCount += 1;

        let growthQueued = gameState.growthQueued;
        const didPickup = gameState.item && isSameCell(nextHead, gameState.item);

        if (didPickup) {
          growthQueued += growthPerItem;
          gameState.score += 1;

          const blocked = occupiedBySnake(gameState.snake);
          const spawn = pickSpawn(gameState.seed, blocked);
          gameState.item = spawn.item;
          gameState.seed = spawn.nextSeed;

          if (!gameState.item) {
            gameState.status = 'won';
            if (gameState === state) {
              pauseButtonsAfterEnd();
              recordRunEnd(gameState);
            }
            return;
          }
        }

        if (growthQueued > 0) {
          growthQueued -= 1;
        } else {
          gameState.snake.pop();
        }

        gameState.growthQueued = growthQueued;
        gameState.queuedDirection = gameState.direction;
      }

      function parseScenarioDirection(rawCommand) {
        if (typeof rawCommand === 'string' && directions[rawCommand]) return rawCommand;
        if (typeof rawCommand === 'string' && keyToDirection[rawCommand]) return keyToDirection[rawCommand];
        if (isObject(rawCommand) && rawCommand !== null && directions[rawCommand.direction]) return rawCommand.direction;
        if (isObject(rawCommand) && directions[keyToDirection[rawCommand.key]]) return keyToDirection[rawCommand.key];
        return null;
      }

      function runScenario(spec = {}) {
        const config = isObject(spec) ? spec : {};
        const steps = Array.isArray(config.steps) ? config.steps : [];
        const maxTicks = Math.max(0, safeInteger(config.maxTicks, 0, 0));
        const seed = toUint32(config.seed, initialSeed);
        const defaultTicks = config.runUntilEnd === true ? 5000 : steps.length;
        const finalTicks = maxTicks > 0 ? maxTicks : defaultTicks;

        const scenarioState = createFreshState(seed);
        const initialDirectionFromScenario = clampDirection(config.initialDirection);
        scenarioState.direction = initialDirectionFromScenario;
        scenarioState.queuedDirection = initialDirectionFromScenario;
        scenarioState.status = 'running';

        const maxIterations = Math.max(0, finalTicks || 0);
        for (let tick = 0; tick < maxIterations && scenarioState.status === 'running'; tick += 1) {
          const command = parseScenarioDirection(steps[tick]);
          if (command) scenarioState.queuedDirection = command;
          step(scenarioState);
        }
        scenarioState.timerMs = scenarioState.tickCount * tickMs;

        return {
          summary: summarizeState(scenarioState),
          completed: scenarioState.status !== 'running',
          state: cloneForScenario(scenarioState)
        };
      }

      if (typeof window !== 'undefined') {
        window.minionsDemo2 = { runScenario };
      }

      function measureLayout() {
        const { width, height } = frame.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const inset = 24;
        const boardPx = Math.max(1, Math.min(width, height) - inset * 2);
        const rawCell = Math.floor(boardPx / Math.max(board.cols, board.rows));
        const cellSize = Math.max(8, rawCell);
        const boardWidth = cellSize * board.cols;
        const boardHeight = cellSize * board.rows;

        layout = {
          width,
          height,
          cellSize,
          boardWidth,
          boardHeight,
          x: Math.round((width - boardWidth) / 2),
          y: Math.round((height - boardHeight) / 2)
        };

        drawBoard();
      }

      function drawCellGrid() {
        const { x, y, cellSize } = layout;
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;

        for (let col = 0; col <= board.cols; col++) {
          const px = x + col * cellSize;
          ctx.beginPath();
          ctx.moveTo(px, y);
          ctx.lineTo(px, y + board.rows * cellSize);
          ctx.stroke();
        }

        for (let row = 0; row <= board.rows; row++) {
          const py = y + row * cellSize;
          ctx.beginPath();
          ctx.moveTo(x, py);
          ctx.lineTo(x + board.cols * cellSize, py);
          ctx.stroke();
        }

        for (let row = 0; row < board.rows; row++) {
          for (let col = 0; col < board.cols; col++) {
            if ((row + col) % 2 === 0) {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            } else {
              ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            }
            ctx.fillRect(
              x + col * cellSize,
              y + row * cellSize,
              cellSize,
              cellSize
            );
          }
        }
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
      }

      function drawMinionSegment(col, row, phase, isHead) {
        const { x, y, cellSize } = layout;
        const baseX = x + (col + 0.5) * cellSize;
        const baseY = y + (row + 0.5) * cellSize;
        const jitter = Math.sin(phase) * (cellSize * 0.06);

        if (isHead) {
          const bodyWidth = cellSize * 0.46;
          const bodyHeight = cellSize * 0.54;
          const bodyX = baseX - bodyWidth / 2;
          const bodyY = baseY - 0.05 * cellSize + jitter;
          const bodyRadius = bodyWidth * 0.3;
          const bodyBottom = bodyY + bodyHeight;

          ctx.fillStyle = 'var(--body)';
          ctx.beginPath();
          roundRect(bodyX, bodyY, bodyWidth, bodyHeight, bodyRadius);
          ctx.fill();

          const headRadius = cellSize * 0.29;
          const headX = baseX;
          const headY = baseY - cellSize * 0.22 + jitter * 0.35;
          ctx.fillStyle = 'var(--head)';
          ctx.beginPath();
          ctx.arc(headX, headY, headRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = '#d4ad2c';
          ctx.lineWidth = Math.max(2, cellSize * 0.05);
          ctx.beginPath();
          ctx.arc(headX, headY, headRadius - 1, -Math.PI * 0.75, Math.PI * 0.75);
          ctx.stroke();

          const eyeGap = cellSize * 0.09;
          const eyeY = headY - cellSize * 0.05;
          const eyeRadius = cellSize * 0.045;
          ctx.fillStyle = '#1a2233';
          ctx.beginPath();
          ctx.arc(headX - eyeGap, eyeY, eyeRadius, 0, Math.PI * 2);
          ctx.arc(headX + eyeGap, eyeY, eyeRadius, 0, Math.PI * 2);
          ctx.fill();

          ctx.strokeStyle = '#cce5ff';
          ctx.lineWidth = Math.max(2, cellSize * 0.035);
          ctx.beginPath();
          ctx.moveTo(baseX - bodyWidth / 2, baseY + jitter * 0.2);
          ctx.lineTo(baseX + bodyWidth / 2, baseY + jitter * 0.2);
          ctx.stroke();

          const footY = bodyBottom + cellSize * 0.11;
          const footW = bodyWidth * 0.25;
          const footH = cellSize * 0.06;
          ctx.fillStyle = '#e2be5a';
          ctx.fillRect(baseX - bodyWidth * 0.26, footY, footW, footH);
          ctx.fillRect(baseX + bodyWidth * 0.01, footY, footW, footH);
          return;
        }

        const radius = cellSize * 0.24;
        ctx.fillStyle = 'rgba(80, 160, 244, 0.94)';
        ctx.beginPath();
        ctx.arc(baseX, baseY + jitter * 0.4, radius, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawItem() {
        if (!state.item) return;

        const { x, y, cellSize } = layout;
        const cx = x + (state.item.col + 0.5) * cellSize;
        const cy = y + (state.item.row + 0.5) * cellSize;
        const pulse = (Math.sin(state.phase * 1.8) + 1) / 2;
        const wobble = cellSize * 0.08 * pulse;

        ctx.fillStyle = '#ffd86b';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.18 + wobble, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f6df6a';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.1 + wobble * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawMinion() {
        const phase = state.phase;
        for (let index = state.snake.length - 1; index >= 0; index--) {
          const segment = state.snake[index];
          drawMinionSegment(segment.col, segment.row, phase + index * 0.08, index === 0);
        }
        drawItem();
      }

      function drawBoard() {
        if (!layout) return;

        ctx.clearRect(0, 0, layout.width, layout.height);
        ctx.fillStyle = 'rgba(3, 7, 25, 0.95)';
        ctx.fillRect(0, 0, layout.width, layout.height);

        const { x, y, boardWidth, boardHeight } = layout;
        const border = 'rgba(255, 255, 255, 0.18)';

        ctx.fillStyle = 'var(--panel)';
        ctx.fillRect(x - 3, y - 3, boardWidth + 6, boardHeight + 6);
        ctx.fillStyle = 'rgba(3, 11, 33, 0.95)';
        ctx.fillRect(x, y, boardWidth, boardHeight);
        ctx.strokeStyle = border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, boardWidth, boardHeight);

        drawCellGrid();
        drawMinion();
      }

      function updateHud() {
        scoreEl.textContent = String(state.score);
        timerEl.textContent = (state.timerMs / 1000).toFixed(1);
        highScoreEl.textContent = String(highScore);
        renderLastRun();

        if (state.status === 'gameOver') {
          hint.textContent = 'Game over. Press Reset to start again.';
          return;
        }

        if (state.status === 'won') {
          hint.textContent = 'You won. Reset for a new round.';
          return;
        }

        if (state.status === 'running') {
          hint.textContent = 'Use arrow keys/WASD or tap a nearby cell to steer.';
          return;
        }

        hint.textContent = 'Press Start to begin. Growth queue: ' + state.growthQueued;
      }

      function cellFromPointer(event) {
        if (!layout) return null;

        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;

        if (px < layout.x || py < layout.y) return null;

        const col = Math.floor((px - layout.x) / layout.cellSize);
        const row = Math.floor((py - layout.y) / layout.cellSize);

        if (col < 0 || col >= board.cols || row < 0 || row >= board.rows) {
          return null;
        }

        return { col, row };
      }

      function handleDirectionFromPointer(event) {
        if (state.status !== 'running') return;

        const head = state.snake[0];
        const target = cellFromPointer(event);
        if (!target || !head) return;

        const deltaCol = target.col - head.col;
        const deltaRow = target.row - head.row;

        if (deltaCol === 0 && deltaRow === 0) return;

        if (Math.abs(deltaCol) >= Math.abs(deltaRow)) {
          setDirection(deltaCol > 0 ? 'right' : 'left');
        } else {
          setDirection(deltaRow > 0 ? 'down' : 'up');
        }
      }

      function handleKeydown(event) {
        const requested = keyToDirection[event.key];
        if (requested) {
          event.preventDefault();
          setDirection(requested);
          return;
        }

        if (event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          if (state.status === 'running') {
            pauseGame();
            return;
          }
          if (state.status === 'paused') {
            resumeGame();
          }
        }
      }

      function startGame() {
        if (state.status === 'running' || state.status === 'gameOver' || state.status === 'won') return;
        state.status = 'running';
        if (state.runId !== runSequence) state.runId = runSequence;
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        updateHud();
      }

      function pauseGame() {
        if (state.status !== 'running') return;
        state.status = 'paused';
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        updateHud();
      }

      function resumeGame() {
        if (state.status !== 'paused') return;
        state.status = 'running';
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        updateHud();
      }

      function resetGame() {
        resetState();
      }

      function loop(ts) {
        if (!state.lastFrameTs) state.lastFrameTs = ts;
        const deltaMs = ts - state.lastFrameTs;
        state.lastFrameTs = ts;

        state.phase += (deltaMs / 1000) * 8;

        if (state.status === 'running' || state.status === 'paused') {
          state.frameAccumulator += deltaMs;
        }

        if (state.status === 'running') {
          state.timerMs += deltaMs;
          state.tickAccumulator += deltaMs;

          while (state.tickAccumulator >= tickMs && state.status === 'running') {
            state.tickAccumulator -= tickMs;
            step();
          }

          drawBoard();
          updateHud();
        }

        if (state.status === 'idle') {
          drawBoard();
          updateHud();
        }

        if (state.status === 'paused' || state.status === 'gameOver' || state.status === 'won') {
          drawBoard();
          updateHud();
        }

        requestAnimationFrame(loop);
      }

      canvas.addEventListener('pointerdown', handleDirectionFromPointer);
      window.addEventListener('keydown', handleKeydown);
      window.addEventListener('resize', measureLayout);
      startBtn.addEventListener('click', () => {
        if (state.status === 'paused') {
          resumeGame();
          return;
        }
        startGame();
      });
      pauseBtn.addEventListener('click', pauseGame);
      resetBtn.addEventListener('click', resetGame);

      hydratePersistence();
      resetState();
      highScoreEl.textContent = String(highScore);
      renderLastRun();
      measureLayout();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
