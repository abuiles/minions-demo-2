<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minions Demo 2</title>
  <style>
    :root {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fefefe;
      background-color: #050a1a;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.06em;
    }

    p {
      margin: 0.25rem 0 0;
      color: #a0b3ff;
    }

    main {
      width: min(600px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #game-frame {
      position: relative;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.5));
      border: 2px solid #6478ff;
      border-radius: 0.75rem;
      padding: 1rem;
      min-height: 320px;
      overflow: hidden;
    }

    #target {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe100, #ffb347);
      box-shadow: 0 0 12px 3px rgba(255, 177, 71, 0.8);
      cursor: pointer;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      color: #fefefe;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      background: #6478ff;
      color: #fff;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #7ea7ff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minions Demo 2</h1>
    <p>Frontend-only prototype: tap glowing targets and keep the streak alive.</p>
  </header>
  <main>
    <div id="game-frame">
      <div id="target" aria-label="game target" role="button"></div>
    </div>

    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="timer">0.0</strong>s</span>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset" disabled>Reset</button>
    </div>
  </main>
  <footer>
    Static shell; deploy to GitHub Pages via <code>index.html</code> at the repository root.
  </footer>
  <script>
    (function () {
      const frame = document.getElementById('game-frame');
      const target = document.getElementById('target');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');

      let score = 0;
      let running = false;
      let timer = 0;
      let intervalId = null;

      function placeTarget() {
        const { width, height } = frame.getBoundingClientRect();
        const padding = 20;
        const x = Math.random() * (width - padding * 2) + padding;
        const y = Math.random() * (height - padding * 2) + padding;
        target.style.transform = `translate(${x}px, ${y}px)`;
      }

      function updateTimer() {
        timer += 0.1;
        timerEl.textContent = timer.toFixed(1);
      }

      function startGame() {
        if (running) return;
        running = true;
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        intervalId = setInterval(updateTimer, 100);
        placeTarget();
      }

      function pauseGame() {
        running = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        clearInterval(intervalId);
      }

      function resetGame() {
        running = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resetBtn.disabled = true;
        clearInterval(intervalId);
        timer = 0;
        score = 0;
        scoreEl.textContent = score;
        timerEl.textContent = '0.0';
        target.style.transform = 'translate(-100px, -100px)';
      }

      target.addEventListener('click', () => {
        if (!running) return;
        score += 10;
        scoreEl.textContent = score;
        placeTarget();
      });

      startBtn.addEventListener('click', startGame);
      pauseBtn.addEventListener('click', pauseGame);
      resetBtn.addEventListener('click', resetGame);

      // Ensure target is hidden until game begins
      resetGame();
    })();
  </script>
</body>
</html>
