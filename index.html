<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minions Demo 2</title>
  <style>
    :root {
      --bg: #050d1f;
      --panel: #0b1531;
      --line: #7f95ff;
      --panel-border: #6b82fb;
      --text: #f2f7ff;
      --muted: #a6bcff;
      --accent: #9cf2ff;
      --cell: rgba(255, 255, 255, 0.07);
      --head: #f6df6a;
      --body: #4f9cf4;
      font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% 0, #0f1e43, #050d1f 55%, #040914 100%);
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.05em;
    }

    p {
      margin: 0.25rem 0 0;
      color: var(--muted);
    }

    main {
      width: min(680px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    #game-frame {
      position: relative;
      width: min(640px, min(92vw, 94vh));
      aspect-ratio: 1 / 1;
      background: linear-gradient(150deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.6));
      border: 2px solid var(--panel-border);
      border-radius: 0.75rem;
      overflow: hidden;
      box-shadow: 0 20px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      touch-action: none;
    }

    #game-frame::before {
      content: '';
      position: absolute;
      inset: 0.65rem;
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 0.55rem;
      pointer-events: none;
    }

    #boardCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .hud {
      color: var(--text);
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      color: var(--text);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      background: linear-gradient(180deg, #7a90ff, #6478ff);
      color: var(--text);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #9aafff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minions Demo 2</h1>
    <p>Frontend-only board demo: move with arrows/WASD or tap a nearby cell.</p>
  </header>
  <main>
    <div id="game-frame">
      <canvas id="boardCanvas"></canvas>
    </div>

    <div class="hud">
      <p id="hint" style="margin: 0 0 0.45rem; color: var(--muted)">
        Press Start to enter the deterministic snake-style loop.
      </p>
      <div class="hud-row">
      <span>Score: <strong id="score">0</strong></span>
      <span>High Score: <strong id="highScore">0</strong></span>
      <span>Time: <strong id="timer">0.0</strong>s</span>
      </div>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset" disabled>Reset</button>
    </div>
  </main>
  <footer>
    Static shell; deploy to GitHub Pages via <code>index.html</code> at the repository root.
  </footer>
  <script>
    (function () {
      const frame = document.getElementById('game-frame');
      const hint = document.getElementById('hint');
      const canvas = document.getElementById('boardCanvas');
      const ctx = canvas.getContext('2d');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');
      const scoreEl = document.getElementById('score');
      const highScoreEl = document.getElementById('highScore');
      const timerEl = document.getElementById('timer');

      const board = { cols: 12, rows: 12 };
      const tickMs = 240;
      const growthPerItem = 1;
      const lcgMultiplier = 1664525;
      const lcgIncrement = 1013904223;
      const initialSeed = 0xdecafbad >>> 0;
      const initialDirection = 'right';
      const storageKey = 'minions-demo-2-state-v2';
      const storageVersion = 2;
      const defaultPersistence = {
        version: storageVersion,
        highScore: 0,
        lastRunSummary: null,
        lastSaveState: null
      };

      const persistedProgress = loadPersistedProgress();

      function isObject(value) {
        return value !== null && typeof value === 'object' && !Array.isArray(value);
      }

      function safeInteger(value, fallback) {
        const num = Number(value);
        return Number.isSafeInteger(num) ? num : fallback;
      }

      function safeUnsigned(value, fallback) {
        const num = safeInteger(value, fallback);
        return typeof num === 'number' && num >= 0 ? num : fallback;
      }

      function sanitizeCell(value, fallback = null) {
        if (!isObject(value)) return fallback;
        const col = safeInteger(value.col, NaN);
        const row = safeInteger(value.row, NaN);
        if (!Number.isInteger(col) || !Number.isInteger(row)) {
          return fallback;
        }

        return {
          col: clampCell(col, board.cols),
          row: clampCell(row, board.rows)
        };
      }

      function sanitizeDirection(value) {
        if (!value) return null;
        const key = String(value);
        return directions[key] ? key : directions[key.toLowerCase()] ? key.toLowerCase() : null;
      }

      function clonePersistedState(state) {
        return {
          version: storageVersion,
          highScore: safeUnsigned(state && state.highScore, 0),
          lastRunSummary: sanitizeSummary(state && state.lastRunSummary),
          lastSaveState: sanitizeSaveState(state && state.lastSaveState)
        };
      }

      function sanitizeSummary(value) {
        if (!isObject(value)) return null;
        const summary = {
          version: storageVersion,
          timestamp: safeUnsigned(value.timestamp, Date.now()),
          context: typeof value.context === 'string' ? value.context : 'unknown',
          status: typeof value.status === 'string' ? value.status : 'unknown',
          score: safeUnsigned(value.score, 0),
          durationMs: safeUnsigned(value.durationMs, 0),
          ticks: safeUnsigned(value.ticks, 0),
          seed: safeUnsigned(value.seed, initialSeed),
          maxTicks: value.maxTicks === undefined || value.maxTicks === null ? null : safeUnsigned(value.maxTicks, 0),
          scenario: value.scenario || null,
          snakeLength: safeUnsigned(value.snakeLength, 0),
          head: sanitizeCell(value.head),
          item: sanitizeCell(value.item),
          movesApplied: safeUnsigned(value.movesApplied, 0),
          endedBy: typeof value.endedBy === 'string' ? value.endedBy : null
        };
        return summary;
      }

      function sanitizeSaveState(value) {
        if (!isObject(value)) return null;
        const wrappedState = isObject(value.state) ? value : null;
        const persistedState = wrappedState ? value.state : value;
        if (!Array.isArray(persistedState.snake) || !persistedState.snake.length) return null;

        const state = cloneRunState(persistedState, {
          allowEmptySnake: false,
          autoSpawnItem: false
        });

        if (!state.snake || !state.snake.length) {
          return null;
        }

        return {
          version: safeUnsigned(
            wrappedState && value.version !== undefined ? value.version : persistedState.version,
            storageVersion
          ),
          scenario: typeof (wrappedState && value.scenario ? value.scenario : persistedState.scenario) === 'string'
            ? wrappedState && value.scenario ? value.scenario : persistedState.scenario
            : null,
          state
        };
      }

      function resolveScenarioStartState(value) {
        if (!isObject(value)) return null;
        if (isObject(value.state) && (Array.isArray(value.state.snake) || isObject(value.state.snake))) {
          return value.state;
        }
        return value;
      }

      function loadPersistedProgress() {
        try {
          if (!window.localStorage) {
            return { ...defaultPersistence };
          }

          const raw = localStorage.getItem(storageKey);
          if (!raw) {
            return { ...defaultPersistence };
          }

          const parsed = JSON.parse(raw);
          if (!isObject(parsed)) {
            return { ...defaultPersistence };
          }

          const loaded = {
            version: safeUnsigned(parsed.version, storageVersion),
            highScore: safeUnsigned(parsed.highScore, defaultPersistence.highScore),
            lastRunSummary: sanitizeSummary(parsed.lastRunSummary),
            lastSaveState: sanitizeSaveState(parsed.lastSaveState)
          };
          return loaded;
        } catch (_error) {
          return { ...defaultPersistence };
        }
      }

      function persistProgress(nextState) {
        try {
          if (!window.localStorage) {
            return;
          }

          localStorage.setItem(storageKey, JSON.stringify(clonePersistedState(nextState)));
        } catch (_error) {
          return;
        }
      }

      function clampDirection(value) {
        return sanitizeDirection(value) || initialDirection;
      }

      function seedFromInput(value, fallback) {
        return safeUnsigned(value, fallback) >>> 0;
      }

      function clampCell(value, max) {
        return Math.min(max - 1, Math.max(0, safeUnsigned(value, 0)));
      }

      let highScore = safeUnsigned(persistedProgress.highScore, 0);

      const directions = {
        up: { dx: 0, dy: -1 },
        down: { dx: 0, dy: 1 },
        left: { dx: -1, dy: 0 },
        right: { dx: 1, dy: 0 }
      };

      const directionAliases = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        W: 'up',
        s: 'down',
        S: 'down',
        a: 'left',
        A: 'left',
        d: 'right',
        D: 'right'
      };

      function normalizeDirection(value) {
        if (!value) return null;
        if (typeof value === 'string') {
          if (directions[value]) return value;
          const lowered = value.toLowerCase();
          return directions[lowered] ? lowered : null;
        }

        if (isObject(value)) {
          if (typeof value.direction === 'string') {
            const direction = normalizeDirection(value.direction);
            if (direction) return direction;
          }

          if (typeof value.dx === 'number' && typeof value.dy === 'number') {
            if (value.dx === 0 && value.dy === -1) return 'up';
            if (value.dx === 0 && value.dy === 1) return 'down';
            if (value.dx === -1 && value.dy === 0) return 'left';
            if (value.dx === 1 && value.dy === 0) return 'right';
          }
        }

        return null;
      }

      const keyToDirection = directionAliases;

      const state = {
        status: 'idle',
        score: 0,
        timerMs: 0,
        tickCount: 0,
        frameAccumulator: 0,
        tickAccumulator: 0,
        direction: initialDirection,
        queuedDirection: initialDirection,
        snake: [],
        growthQueued: 0,
        seed: initialSeed,
        item: null,
        phase: 0,
        lastFrameTs: 0
      };

      let layout = null;

      function stepRng(seed) {
        return (Math.imul(seed, lcgMultiplier) + lcgIncrement) >>> 0;
      }

      function copySnake(rawSnake) {
        const source = Array.isArray(rawSnake) ? rawSnake : [];
        return source.map((segment) => ({
          col: clampCell(Number.isInteger(segment && segment.col) ? segment.col : 0, board.cols),
          row: clampCell(Number.isInteger(segment && segment.row) ? segment.row : 0, board.rows)
        }));
      }

      function cloneRunState(rawState, options = {}) {
        const state = rawState && isObject(rawState) ? rawState : {};

        const snake = copySnake(state.snake);
        const sanitizedSnake =
          snake.length > 0 ? snake : [{ col: 5, row: 5 }, { col: 4, row: 5 }, { col: 3, row: 5 }];

        const direction = clampDirection(state.direction);
        const queuedDirection = clampDirection(state.queuedDirection || state.direction);

        const runState = {
          status: typeof state.status === 'string' ? state.status : 'idle',
          score: safeUnsigned(state.score, 0),
          timerMs: safeUnsigned(state.timerMs, 0),
          tickCount: safeUnsigned(state.tickCount, 0),
          frameAccumulator: 0,
          tickAccumulator: 0,
          direction,
          queuedDirection,
          snake: options.allowEmptySnake ? snake : sanitizedSnake,
          growthQueued: safeUnsigned(state.growthQueued, 0),
          seed: seedFromInput(state.seed, initialSeed),
          item: sanitizeCell(state.item),
          phase: safeUnsigned(state.phase, 0),
          lastFrameTs: 0
        };

        const shouldSpawn = options.autoSpawnItem !== false;
        if (shouldSpawn && runState.item === null) {
          const blocked = occupiedBySnake(runState.snake);
          const spawn = pickSpawn(runState.seed, blocked);
          runState.item = spawn.item;
          runState.seed = spawn.nextSeed;
        }
        return runState;
      }

      function persistProgressState() {
        persistProgress(persistedProgress);
      }

      function persistCurrentRunSnapshot(context = 'gameplay', runState = state) {
        persistedProgress.lastSaveState = buildPersistableState(runState, context);
        persistProgressState();
      }

      function setHighScore(value) {
        const parsed = safeUnsigned(value, highScore);
        if (parsed > highScore) {
          highScore = parsed;
          persistedProgress.highScore = parsed;
          highScoreEl.textContent = String(highScore);
          persistProgressState();
        }
      }

      function buildRunSummary(runState, context, extras = {}) {
        const head = runState.snake[0] || null;
        return {
          version: storageVersion,
          context,
          timestamp: safeUnsigned(
            extras.timestamp,
            context === 'scenario' && !Object.prototype.hasOwnProperty.call(extras, 'timestamp')
              ? 0
              : Date.now()
          ),
          status: runState.status,
          score: runState.score,
          durationMs: runState.timerMs,
          ticks: runState.tickCount,
          seed: runState.seed,
          maxTicks: extras.maxTicks === undefined ? null : extras.maxTicks,
          scenario: extras.scenario || null,
          snakeLength: runState.snake.length,
          head: head ? { col: head.col, row: head.row } : null,
          item: runState.item ? { col: runState.item.col, row: runState.item.row } : null,
          movesApplied: safeUnsigned(extras.movesApplied, runState.tickCount),
          endedBy: extras.endedBy || 'completed'
        };
      }

      function buildPersistableState(runState, context = 'gameplay') {
        return {
          version: storageVersion,
          scenario: typeof context === 'string' ? context : 'gameplay',
          state: {
            version: storageVersion,
            status: runState.status,
            score: safeUnsigned(runState.score, 0),
            timerMs: safeUnsigned(runState.timerMs, 0),
            tickCount: safeUnsigned(runState.tickCount, 0),
            direction: clampDirection(runState.direction),
            queuedDirection: clampDirection(runState.queuedDirection),
            snake: copySnake(runState.snake),
            growthQueued: safeUnsigned(runState.growthQueued, 0),
            seed: seedFromInput(runState.seed, initialSeed),
            item: sanitizeCell(runState.item),
            phase: safeUnsigned(runState.phase, 0)
          }
        };
      }

      function finalizeRun(runState, context, extras = {}) {
        const persistSummary = extras.persist === false ? false : true;
        const shouldUpdateScore =
          extras.updateHighScore === false ? false : context === 'gameplay';

        const summary = buildRunSummary(runState, context, extras);

        if (shouldUpdateScore) {
          setHighScore(runState.score);
        }

        persistedProgress.lastRunSummary = summary;
        if (persistSummary) {
          persistProgressState();
        }

        return summary;
      }

      function createInitialRunState(overrides = {}) {
        const baseSnake =
          overrides.snake && Array.isArray(overrides.snake) && overrides.snake.length
            ? overrides.snake
            : [{ col: 5, row: 5 }, { col: 4, row: 5 }, { col: 3, row: 5 }];

        const runState = cloneRunState(
          {
            status: 'idle',
            score: safeUnsigned(overrides.score, 0),
            timerMs: safeUnsigned(overrides.timerMs, 0),
            tickCount: safeUnsigned(overrides.tickCount, 0),
            direction: clampDirection(overrides.direction),
            queuedDirection: clampDirection(overrides.queuedDirection || overrides.direction),
            snake: baseSnake,
            growthQueued: safeUnsigned(overrides.growthQueued, 0),
            seed: seedFromInput(overrides.seed, initialSeed),
            item: sanitizeCell(overrides.item),
            phase: safeUnsigned(overrides.phase, 0)
          },
          {
            allowEmptySnake: false
          }
        );

        const blocked = occupiedBySnake(runState.snake);
        if (runState.item) {
          const blockedItem = keyFromCell(runState.item.col, runState.item.row);
          if (blocked.has(blockedItem)) {
            runState.item = null;
          }
        }

        if (runState.item === null) {
          const spawn = pickSpawn(runState.seed, blocked);
          runState.item = spawn.item;
          runState.seed = spawn.nextSeed;
        }

        return runState;
      }

      function resetState() {
        const initial = createInitialRunState();
        Object.assign(state, initial);
        state.status = 'idle';
        persistCurrentRunSnapshot('reset', state);

        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resetBtn.disabled = false;
        updateHud();
        drawBoard();
      }

      function handleRunComplete(completedState, extras = {}) {
        pauseButtonsAfterEnd();
        persistCurrentRunSnapshot('gameover', completedState);
        finalizeRun(completedState, 'gameplay', {
          scenario: typeof extras.scenario === 'string' ? extras.scenario : null,
          endedBy: extras.endedBy || 'completed',
          movesApplied: completedState.tickCount,
          maxTicks: null,
          persist: true
        });
      }

      function keyFromCell(col, row) {
        return `${col}:${row}`;
      }

      function nextDirectionFromInput(current, requested) {
        if (!requested || requested === current) return current;

        const a = directions[current];
        const b = directions[requested];
        const isReverse = a.dx === -b.dx && a.dy === -b.dy;
        if (isReverse) return current;

        return requested;
      }

      function occupiedBySnake(snake) {
        const blocked = new Set();
        for (const segment of snake) {
          blocked.add(keyFromCell(segment.col, segment.row));
        }
        return blocked;
      }

      function pickSpawn(seed, blockedCells) {
        const totalCells = board.cols * board.rows;
        let nextSeed = seed;
        let spawn = null;

        if (blockedCells.size >= totalCells) {
          return { item: null, nextSeed };
        }

        for (let attempts = 0; attempts < totalCells * 4; attempts += 1) {
          nextSeed = stepRng(nextSeed);
          const col = nextSeed % board.cols;
          nextSeed = stepRng(nextSeed);
          const row = nextSeed % board.rows;
          const candidate = keyFromCell(col, row);
          if (!blockedCells.has(candidate)) {
            spawn = { col, row };
            break;
          }
        }

        if (!spawn) {
          // Deterministic fallback scan when pseudo-random path is exhausted.
          for (let row = 0; row < board.rows; row += 1) {
            for (let col = 0; col < board.cols; col += 1) {
              const candidate = keyFromCell(col, row);
              if (!blockedCells.has(candidate)) {
                spawn = { col, row };
                break;
              }
            }
            if (spawn) break;
          }
        }

        return { item: spawn, nextSeed };
      }

      function isSameCell(a, b) {
        return a.col === b.col && a.row === b.row;
      }

      function pauseButtonsAfterEnd() {
        pauseBtn.disabled = true;
        startBtn.disabled = true;
      }

      function setDirection(intent) {
        if (!intent || !directions[intent]) return;
        if (state.status === 'gameOver' || state.status === 'won') return;
        state.queuedDirection = intent;
      }

      function stepWithState(runState, onComplete) {
        if (runState.status !== 'running') return;

        const prevStatus = runState.status;

        runState.direction = nextDirectionFromInput(runState.direction, runState.queuedDirection);
        const move = directions[runState.direction];
        const head = runState.snake[0];
        const nextHead = {
          col: head.col + move.dx,
          row: head.row + move.dy
        };

        const hitWall =
          nextHead.col < 0 ||
          nextHead.row < 0 ||
          nextHead.col >= board.cols ||
          nextHead.row >= board.rows;

        const bodyForSelfCollision =
          runState.growthQueued > 0 ? runState.snake : runState.snake.slice(0, -1);

        const hitSelf = bodyForSelfCollision.some((segment) => isSameCell(segment, nextHead));

        if (hitWall || hitSelf) {
          runState.status = 'gameOver';
          if (prevStatus === 'running' && onComplete) {
            onComplete(runState, { endedBy: 'collision' });
          }
          return;
        }

        runState.snake.unshift(nextHead);

        let growthQueued = runState.growthQueued;
        const didPickup = runState.item && isSameCell(nextHead, runState.item);

        if (didPickup) {
          growthQueued += growthPerItem;
          runState.score += 1;

          const blocked = occupiedBySnake(runState.snake);
          const spawn = pickSpawn(runState.seed, blocked);
          runState.item = spawn.item;
          runState.seed = spawn.nextSeed;

          if (!runState.item) {
            runState.status = 'won';
          }
        }

        if (growthQueued > 0) {
          growthQueued -= 1;
        } else {
          runState.snake.pop();
        }

        runState.growthQueued = growthQueued;
        runState.queuedDirection = runState.direction;
        runState.tickCount += 1;

        if (runState.status !== prevStatus && onComplete) {
          onComplete(runState, { endedBy: runState.status === 'won' ? 'all-items-collected' : 'collision' });
        }
      }

      function normalizeScenarioMoves(movesInput) {
        const parsed = [];
        if (!Array.isArray(movesInput)) return parsed;

        for (let index = 0; index < movesInput.length; index += 1) {
          const nextMove = movesInput[index];
          const direction = normalizeDirection(
            nextMove && nextMove.direction !== undefined ? nextMove.direction : nextMove
          );
          if (!direction) continue;
          const tick = safeUnsigned(nextMove && (nextMove.tick ?? nextMove.at), index);
          parsed.push({
            tick: safeUnsigned(tick, index),
            index,
            direction
          });
        }

        parsed.sort((a, b) => (a.tick - b.tick) || (a.index - b.index));
        return parsed;
      }

      function runScenario(options = {}) {
        const normalizedMoves = normalizeScenarioMoves(options.moves);
        const normalizedStartState = resolveScenarioStartState(
          isObject(options.startState) ? options.startState : null
        );
        const chosenSeed =
          normalizedStartState && normalizedStartState.seed !== undefined
            ? normalizedStartState.seed
            : options.seed;

        const runState = cloneRunState(
          normalizedStartState
            ? {
                status: 'idle',
                score: safeUnsigned(normalizedStartState.score, safeUnsigned(options.score, 0)),
                timerMs: safeUnsigned(normalizedStartState.durationMs, safeUnsigned(options.timerMs, 0)),
                tickCount: safeUnsigned(normalizedStartState.ticks, safeUnsigned(options.tickCount, 0)),
                direction: clampDirection(normalizedStartState.direction || options.direction),
                queuedDirection: clampDirection(
                  normalizedStartState.queuedDirection || normalizedStartState.direction || options.direction
                ),
                snake: copySnake(
                  normalizedStartState && Array.isArray(normalizedStartState.snake) && normalizedStartState.snake.length
                    ? normalizedStartState.snake
                    : []
                ),
                growthQueued: safeUnsigned(normalizedStartState.growthQueued, safeUnsigned(options.growthQueued, 0)),
                seed: seedFromInput(chosenSeed, initialSeed),
                item: sanitizeCell(normalizedStartState.item),
                phase: safeUnsigned(normalizedStartState.phase, safeUnsigned(options.phase, 0))
              }
            : {
                status: 'idle',
                score: safeUnsigned(options.score, 0),
                timerMs: safeUnsigned(options.timerMs, 0),
                tickCount: safeUnsigned(options.tickCount, 0),
                direction: clampDirection(options.direction),
                queuedDirection: clampDirection(options.queuedDirection || options.direction),
                snake: [],
                growthQueued: safeUnsigned(options.growthQueued, 0),
                seed: seedFromInput(options.seed, initialSeed),
                item: sanitizeCell(options.item),
                phase: safeUnsigned(options.phase, 0)
              },
          {
            allowEmptySnake: !normalizedStartState
          }
        );

        if (runState.snake.length === 0) {
          runState.snake = [{ col: 5, row: 5 }, { col: 4, row: 5 }, { col: 3, row: 5 }];
        }
        const blocked = occupiedBySnake(runState.snake);
        if (runState.item) {
          const blockedItem = keyFromCell(runState.item.col, runState.item.row);
          if (blocked.has(blockedItem)) {
            runState.item = null;
          }
        }

        if (runState.item === null && blocked.size < board.cols * board.rows) {
          const spawn = pickSpawn(runState.seed, blocked);
          runState.item = spawn.item;
          runState.seed = spawn.nextSeed;
        }

        runState.status = 'running';
        const baseTimerMs = safeUnsigned(runState.timerMs, 0);
        runState.timerMs = baseTimerMs;

        const maxTicks = safeUnsigned(options.maxTicks, 200);
        const maxRemainingTicks = Math.max(0, maxTicks - runState.tickCount);
        let endedBy = 'running';
        let moveCursor = 0;
        const normalizedMovesForRun = normalizedMoves;

        for (let tick = 0; tick < maxRemainingTicks && runState.status === 'running'; tick += 1) {
          while (
            moveCursor < normalizedMovesForRun.length &&
            normalizedMovesForRun[moveCursor].tick === tick
          ) {
            runState.queuedDirection = normalizedMovesForRun[moveCursor].direction;
            moveCursor += 1;
          }
          stepWithState(runState);
          runState.timerMs = baseTimerMs + (tick + 1) * tickMs;
        }

        if (runState.status === 'running' && runState.tickCount >= maxTicks) {
          endedBy = 'max-ticks';
        } else if (runState.status === 'gameOver' || runState.status === 'won') {
          endedBy = runState.status === 'won' ? 'all-items-collected' : 'collision';
        }

        const scenarioSummary = finalizeRun(runState, 'scenario', {
          maxTicks,
          scenario: typeof options.name === 'string' ? options.name : null,
          movesApplied: runState.tickCount,
          endedBy,
          timestamp: safeUnsigned(options.timestamp, 0),
          persist: options.persist !== false,
          updateHighScore: false
        });

        return scenarioSummary;
      }

      function measureLayout() {
        const { width, height } = frame.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;

        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const inset = 24;
        const boardPx = Math.max(1, Math.min(width, height) - inset * 2);
        const rawCell = Math.floor(boardPx / Math.max(board.cols, board.rows));
        const cellSize = Math.max(8, rawCell);
        const boardWidth = cellSize * board.cols;
        const boardHeight = cellSize * board.rows;

        layout = {
          width,
          height,
          cellSize,
          boardWidth,
          boardHeight,
          x: Math.round((width - boardWidth) / 2),
          y: Math.round((height - boardHeight) / 2)
        };

        drawBoard();
      }

      function drawCellGrid() {
        const { x, y, cellSize } = layout;
        ctx.strokeStyle = 'rgba(255,255,255,0.12)';
        ctx.lineWidth = 1;

        for (let col = 0; col <= board.cols; col++) {
          const px = x + col * cellSize;
          ctx.beginPath();
          ctx.moveTo(px, y);
          ctx.lineTo(px, y + board.rows * cellSize);
          ctx.stroke();
        }

        for (let row = 0; row <= board.rows; row++) {
          const py = y + row * cellSize;
          ctx.beginPath();
          ctx.moveTo(x, py);
          ctx.lineTo(x + board.cols * cellSize, py);
          ctx.stroke();
        }

        for (let row = 0; row < board.rows; row++) {
          for (let col = 0; col < board.cols; col++) {
            if ((row + col) % 2 === 0) {
              ctx.fillStyle = 'rgba(255, 255, 255, 0.03)';
            } else {
              ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
            }
            ctx.fillRect(
              x + col * cellSize,
              y + row * cellSize,
              cellSize,
              cellSize
            );
          }
        }
      }

      function roundRect(x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + width, y, x + width, y + height, r);
        ctx.arcTo(x + width, y + height, x, y + height, r);
        ctx.arcTo(x, y + height, x, y, r);
        ctx.arcTo(x, y, x + width, y, r);
      }

      function drawMinionSegment(col, row, phase, isHead) {
        const { x, y, cellSize } = layout;
        const baseX = x + (col + 0.5) * cellSize;
        const baseY = y + (row + 0.5) * cellSize;
        const jitter = Math.sin(phase) * (cellSize * 0.06);

        const scale = isHead ? 1 : 0.88;
        const bodyWidth = cellSize * 0.47 * scale;
        const bodyHeight = cellSize * (isHead ? 0.58 : 0.52) * scale;
        const bodyX = baseX - bodyWidth / 2;
        const bodyY = baseY - bodyHeight * 0.08 + jitter * 0.25;
        const bodyRadius = bodyWidth * 0.28;
        const bodyBottom = bodyY + bodyHeight;

        if (isHead) {
          ctx.shadowColor = 'rgba(0, 0, 0, 0.25)';
          ctx.shadowBlur = 4;
        }

        ctx.fillStyle = isHead ? '#5fb6f4' : '#4b97ef';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.18)';
        ctx.shadowBlur = 3;
        ctx.beginPath();
        roundRect(bodyX, bodyY, bodyWidth, bodyHeight, bodyRadius);
        ctx.fill();
        ctx.shadowBlur = 0;

        const headW = Math.max(4.2, cellSize * 0.32 * scale);
        const headX = baseX + (isHead ? bodyWidth * 0.02 : 0);
        const headY = baseY - bodyHeight * 0.25 + jitter * 0.2;
        const capHeight = Math.max(2.8, cellSize * 0.22 * scale);
        ctx.fillStyle = isHead ? 'var(--head)' : '#f7e06e';
        ctx.beginPath();
        roundRect(
          headX - headW,
          headY - capHeight,
          headW * 2,
          capHeight * 1.35,
          Math.min(3, headW * 0.45)
        );
        ctx.fill();

        const maskY = baseY + bodyHeight * 0.1 + jitter * 0.15;
        const maskX = baseX - bodyWidth * 0.24;
        const maskW = bodyWidth * 0.48;
        const maskH = bodyHeight * 0.28;
        ctx.fillStyle = '#f0f7ff';
        ctx.beginPath();
        roundRect(maskX, maskY - maskH / 2, maskW, maskH, Math.min(maskH / 3, 2.8));
        ctx.fill();

        const eyeY = maskY;
        const eyeGap = bodyWidth * 0.18;
        const eyeR = Math.max(1.2, cellSize * 0.028);
        ctx.fillStyle = '#10192a';
        ctx.beginPath();
        ctx.arc(baseX - eyeGap, eyeY, eyeR, 0, Math.PI * 2);
        ctx.arc(baseX + eyeGap, eyeY, eyeR, 0, Math.PI * 2);
        ctx.fill();

        if (isHead) {
          const strapY = maskY - maskH * 0.44;
          const strapGlow = cellSize * 0.08;
          ctx.strokeStyle = 'rgba(24, 33, 57, 0.7)';
          ctx.lineWidth = Math.max(1, cellSize * 0.022);
          ctx.beginPath();
          ctx.moveTo(bodyX + 1, strapY);
          ctx.lineTo(bodyX + bodyWidth - 1, strapY);
          ctx.stroke();

          ctx.strokeStyle = '#5d6478';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(maskX - maskH * 0.2, eyeY);
          ctx.quadraticCurveTo(baseX, maskY - maskH * 0.6, maskX + maskW + maskH * 0.2, eyeY);
          ctx.stroke();

          ctx.fillStyle = '#d99d1f';
          ctx.beginPath();
          ctx.arc(headX + headW * 0.28, baseY - cellSize * 0.22, strapGlow * 0.32, 0, Math.PI * 2);
          ctx.fill();
        } else {
          const glove = cellSize * 0.055;
          ctx.fillStyle = '#efcf67';
          ctx.fillRect(bodyX + cellSize * 0.04, bodyY + bodyHeight * 0.18, glove, bodyHeight * 0.5);
          ctx.fillRect(bodyX + bodyWidth - cellSize * 0.04 - glove, bodyY + bodyHeight * 0.18, glove, bodyHeight * 0.5);
        }

        const footY = bodyBottom + cellSize * 0.11;
        const footW = bodyWidth * 0.26;
        const footH = cellSize * 0.055;
        ctx.fillStyle = '#f0d47a';
        ctx.fillRect(baseX - bodyWidth * 0.24, footY, footW, footH);
        ctx.fillRect(baseX + bodyWidth * 0.02, footY, footW, footH);

        if (isHead && cellSize > 12) {
          ctx.strokeStyle = '#9ccfff';
          ctx.lineWidth = Math.max(1.2, cellSize * 0.022);
          ctx.beginPath();
          ctx.moveTo(baseX - bodyWidth * 0.17, bodyY + bodyHeight * 0.2);
          ctx.lineTo(baseX + bodyWidth * 0.17, bodyY + bodyHeight * 0.2);
          ctx.stroke();
        }
      }

      function drawItem() {
        if (!state.item) return;

        const { x, y, cellSize } = layout;
        const cx = x + (state.item.col + 0.5) * cellSize;
        const cy = y + (state.item.row + 0.5) * cellSize;
        const pulse = (Math.sin(state.phase * 1.8) + 1) / 2;
        const wobble = cellSize * 0.08 * pulse;

        ctx.fillStyle = '#ffd86b';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.18 + wobble, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#f6df6a';
        ctx.beginPath();
        ctx.arc(cx, cy, cellSize * 0.1 + wobble * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawMinion() {
        const phase = state.phase;
        for (let index = state.snake.length - 1; index >= 0; index--) {
          const segment = state.snake[index];
          drawMinionSegment(segment.col, segment.row, phase + index * 0.08, index === 0);
        }
        drawItem();
      }

      function drawBoard() {
        if (!layout) return;

        ctx.clearRect(0, 0, layout.width, layout.height);
        ctx.fillStyle = 'rgba(3, 7, 25, 0.95)';
        ctx.fillRect(0, 0, layout.width, layout.height);

        const { x, y, boardWidth, boardHeight } = layout;
        const border = 'rgba(255, 255, 255, 0.18)';

        ctx.fillStyle = 'var(--panel)';
        ctx.fillRect(x - 3, y - 3, boardWidth + 6, boardHeight + 6);
        ctx.fillStyle = 'rgba(3, 11, 33, 0.95)';
        ctx.fillRect(x, y, boardWidth, boardHeight);
        ctx.strokeStyle = border;
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, boardWidth, boardHeight);

        drawCellGrid();
        drawMinion();
      }

      function updateHud() {
        scoreEl.textContent = String(state.score);
        highScoreEl.textContent = String(highScore);
        timerEl.textContent = (state.timerMs / 1000).toFixed(1);

        if (state.status === 'gameOver') {
          hint.textContent = 'Game over. Press Reset to start again.';
          return;
        }

        if (state.status === 'won') {
          hint.textContent = 'You won. Reset for a new round.';
          return;
        }

        if (state.status === 'running') {
          hint.textContent = 'Use arrow keys/WASD or tap a nearby cell to steer.';
          return;
        }

        hint.textContent = 'Press Start to begin. Growth queue: ' + state.growthQueued;
      }

      function updateHudFromPersistence() {
        highScore = safeUnsigned(persistedProgress.highScore, highScore);
        if (highScoreEl) highScoreEl.textContent = String(highScore);
      }

      function cellFromPointer(event) {
        if (!layout) return null;

        const rect = canvas.getBoundingClientRect();
        const px = event.clientX - rect.left;
        const py = event.clientY - rect.top;

        if (px < layout.x || py < layout.y) return null;

        const col = Math.floor((px - layout.x) / layout.cellSize);
        const row = Math.floor((py - layout.y) / layout.cellSize);

        if (col < 0 || col >= board.cols || row < 0 || row >= board.rows) {
          return null;
        }

        return { col, row };
      }

      function handleDirectionFromPointer(event) {
        if (state.status !== 'running') return;

        const head = state.snake[0];
        const target = cellFromPointer(event);
        if (!target || !head) return;

        const deltaCol = target.col - head.col;
        const deltaRow = target.row - head.row;

        if (deltaCol === 0 && deltaRow === 0) return;

        if (Math.abs(deltaCol) >= Math.abs(deltaRow)) {
          setDirection(deltaCol > 0 ? 'right' : 'left');
        } else {
          setDirection(deltaRow > 0 ? 'down' : 'up');
        }
      }

      function handleKeydown(event) {
        const requested = keyToDirection[event.key];
        if (requested) {
          event.preventDefault();
          setDirection(requested);
          return;
        }

        if (event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          if (state.status === 'running') {
            pauseGame();
            return;
          }
          if (state.status === 'paused') {
            resumeGame();
          }
        }
      }

      function startGame() {
        if (state.status === 'running' || state.status === 'gameOver' || state.status === 'won') return;
        state.status = 'running';
        persistCurrentRunSnapshot('start', state);
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        updateHud();
      }

      function pauseGame() {
        if (state.status !== 'running') return;
        state.status = 'paused';
        persistCurrentRunSnapshot('pause', state);
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        updateHud();
      }

      function resumeGame() {
        if (state.status !== 'paused') return;
        state.status = 'running';
        persistCurrentRunSnapshot('resume', state);
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        updateHud();
      }

      function resetGame() {
        resetState();
      }

      function loop(ts) {
        if (!state.lastFrameTs) state.lastFrameTs = ts;
        const deltaMs = ts - state.lastFrameTs;
        state.lastFrameTs = ts;

        state.phase += (deltaMs / 1000) * 8;

        if (state.status === 'running' || state.status === 'paused') {
          state.frameAccumulator += deltaMs;
        }

        if (state.status === 'running') {
          state.timerMs += deltaMs;
          state.tickAccumulator += deltaMs;

          while (state.tickAccumulator >= tickMs && state.status === 'running') {
            state.tickAccumulator -= tickMs;
            stepWithState(state, handleRunComplete);
          }

          drawBoard();
          updateHud();
        }

        if (state.status === 'idle') {
          drawBoard();
          updateHud();
        }

        if (state.status === 'paused' || state.status === 'gameOver' || state.status === 'won') {
          drawBoard();
          updateHud();
        }

        requestAnimationFrame(loop);
      }

      canvas.addEventListener('pointerdown', handleDirectionFromPointer);
      window.addEventListener('keydown', handleKeydown);
      window.addEventListener('resize', measureLayout);
      startBtn.addEventListener('click', () => {
        if (state.status === 'paused') {
          resumeGame();
          return;
        }
        startGame();
      });
      pauseBtn.addEventListener('click', pauseGame);
      resetBtn.addEventListener('click', resetGame);

      window.runScenario = runScenario;
      window.getMinionsPersistedState = () => clonePersistedState(persistedProgress);
      window.clearMinionsPersistedState = () => {
        persistedProgress.highScore = 0;
        persistedProgress.lastRunSummary = null;
        persistedProgress.lastSaveState = null;
        persistProgressState();
        updateHudFromPersistence();
      };

      updateHudFromPersistence();
      resetState();
      measureLayout();
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
