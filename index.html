<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minions Demo 2</title>
  <style>
    :root {
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fefefe;
      background-color: #050a1a;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0.06em;
    }

    p {
      margin: 0.25rem 0 0;
      color: #a0b3ff;
    }

    main {
      width: min(600px, 100%);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #game-frame {
      position: relative;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.5));
      border: 2px solid #6478ff;
      border-radius: 0.75rem;
      padding: 1rem;
      min-height: 320px;
      overflow: hidden;
    }

    #target {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffe100, #ffb347);
      box-shadow: 0 0 12px 3px rgba(255, 177, 71, 0.8);
      cursor: pointer;
    }

    #player {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: radial-gradient(circle, #7bff7b, #2bb673);
      box-shadow: 0 0 12px 2px rgba(123, 255, 123, 0.8);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      color: #fefefe;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 0.25rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      background: #6478ff;
      color: #fff;
      transition: transform 0.1s ease, box-shadow 0.2s ease;
    }

    button:active {
      transform: translateY(2px);
      box-shadow: inset 0 0 8px rgba(0, 0, 0, 0.35);
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: #7ea7ff;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Minions Demo 2</h1>
    <p>Frontend-only prototype: tap glowing targets and keep the streak alive.</p>
  </header>
  <main>
    <div id="game-frame">
      <div id="player" aria-label="player" role="img"></div>
      <div id="target" aria-label="game target" role="button"></div>
    </div>

    <div class="hud">
      <span>Score: <strong id="score">0</strong></span>
      <span>Time: <strong id="timer">0.0</strong>s</span>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause" disabled>Pause</button>
      <button id="reset" disabled>Reset</button>
    </div>
  </main>
  <footer>
    Static shell; deploy to GitHub Pages via <code>index.html</code> at the repository root.
  </footer>
  <script>
    (function () {
      const frame = document.getElementById('game-frame');
      const player = document.getElementById('player');
      const target = document.getElementById('target');
      const startBtn = document.getElementById('start');
      const pauseBtn = document.getElementById('pause');
      const resetBtn = document.getElementById('reset');
      const scoreEl = document.getElementById('score');
      const timerEl = document.getElementById('timer');

      let score = 0;
      let running = false;
      let timer = 0;
      let intervalId = null;
      let tickCount = 0;

      const framePadding = 16;
      const playerSize = 32;
      const targetSize = 48;
      const moveStep = 14;
      const tickDelayMs = 100;

      let playerX = 0;
      let playerY = 0;
      let targetX = 0;
      let targetY = 0;

      const directionVectors = {
        up: { x: 0, y: -1 },
        down: { x: 0, y: 1 },
        left: { x: -1, y: 0 },
        right: { x: 1, y: 0 },
      };
      const directionFromKey = {
        ArrowUp: 'up',
        ArrowDown: 'down',
        ArrowLeft: 'left',
        ArrowRight: 'right',
        w: 'up',
        W: 'up',
        s: 'down',
        S: 'down',
        a: 'left',
        A: 'left',
        d: 'right',
        D: 'right',
      };

      let direction = directionVectors.right;
      let queuedDirection = null;
      let queuedForTick = -1;

      function placeTarget() {
        const { width, height } = frame.getBoundingClientRect();
        const x = Math.random() * (width - targetSize - framePadding * 2) + framePadding;
        const y = Math.random() * (height - targetSize - framePadding * 2) + framePadding;
        targetX = x;
        targetY = y;
        target.style.transform = `translate(${targetX}px, ${targetY}px)`;
      }

      function placePlayer(reset = false) {
        const { width, height } = frame.getBoundingClientRect();

        if (reset || playerX < 0) {
          playerX = (width - playerSize) / 2;
          playerY = (height - playerSize) / 2;
        } else {
          const maxX = width - playerSize;
          const maxY = height - playerSize;
          playerX = Math.min(Math.max(playerX, 0), maxX);
          playerY = Math.min(Math.max(playerY, 0), maxY);
        }

        player.style.transform = `translate(${playerX}px, ${playerY}px)`;
      }

      function updateTimer() {
        timer += 0.1;
        timerEl.textContent = timer.toFixed(1);
      }

      function isReverse(dirA, dirB) {
        return dirA.x === -dirB.x && dirA.y === -dirB.y;
      }

      function isSameDirection(dirA, dirB) {
        return dirA.x === dirB.x && dirA.y === dirB.y;
      }

      function queueDirection(event) {
        const nextDirectionName = directionFromKey[event.key];
        if (!nextDirectionName) return;

        event.preventDefault();
        const nextDirection = directionVectors[nextDirectionName];
        const baseDirection = queuedDirection || direction;

        if (
          tickCount === queuedForTick ||
          isSameDirection(baseDirection, nextDirection) ||
          isReverse(baseDirection, nextDirection)
        ) {
          return;
        }

        queuedDirection = nextDirection;
        queuedForTick = tickCount;
      }

      function addScore() {
        score += 10;
        scoreEl.textContent = score;
      }

      function checkCollision() {
        const hit =
          playerX < targetX + targetSize &&
          playerX + playerSize > targetX &&
          playerY < targetY + targetSize &&
          playerY + playerSize > targetY;

        if (hit) {
          addScore();
          placeTarget();
        }
      }

      function movePlayer() {
        if (queuedDirection) {
          direction = queuedDirection;
          queuedDirection = null;
        }

        const { width, height } = frame.getBoundingClientRect();
        const maxX = width - playerSize;
        const maxY = height - playerSize;

        playerX = Math.min(Math.max(playerX + direction.x * moveStep, 0), maxX);
        playerY = Math.min(Math.max(playerY + direction.y * moveStep, 0), maxY);
        player.style.transform = `translate(${playerX}px, ${playerY}px)`;
      }

      function runTick() {
        if (!running) return;

        tickCount += 1;
        movePlayer();
        checkCollision();
        updateTimer();
      }

      function startGame() {
        if (running) return;
        running = true;
        tickCount += 1;
        startBtn.disabled = true;
        pauseBtn.disabled = false;
        resetBtn.disabled = false;
        intervalId = setInterval(runTick, tickDelayMs);
        placeTarget();
        if (playerX < 0 || playerY < 0) {
          placePlayer(true);
        }
      }

      function pauseGame() {
        if (!running) return;
        running = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        clearInterval(intervalId);
      }

      function resetGame() {
        running = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        resetBtn.disabled = true;
        clearInterval(intervalId);
        tickCount += 1;
        timer = 0;
        score = 0;
        scoreEl.textContent = score;
        timerEl.textContent = '0.0';
        direction = directionVectors.right;
        queuedDirection = null;
        queuedForTick = -1;
        playerX = -1;
        playerY = -1;
        player.style.transform = 'translate(-100px, -100px)';
        target.style.transform = 'translate(-100px, -100px)';
      }

      target.addEventListener('click', () => {
        if (!running) return;
        addScore();
        placeTarget();
      });

      startBtn.addEventListener('click', startGame);
      pauseBtn.addEventListener('click', pauseGame);
      resetBtn.addEventListener('click', resetGame);
      window.addEventListener('keydown', queueDirection);

      // Ensure target is hidden until game begins
      resetGame();
    })();
  </script>
</body>
</html>
